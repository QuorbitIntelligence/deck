::selection{background:var(--primary); color:#fff;}
button{font-family:inherit; cursor:pointer;}
input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{width:10px; height:10px;}
::-webkit-scrollbar-thumb{background:var(--border); border-radius:8px;}
::-webkit-scrollbar-track{background:transparent;}
a{color:inherit;}

/* ---------- LOGIN ---------- */
#login-screen{position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:
  radial-gradient(circle at 20% 20%, var(--primary-light), transparent 45%),
  radial-gradient(circle at 85% 80%, var(--violet-light), transparent 40%), var(--bg); z-index:500;}
.login-card{width:380px; max-width:90vw; background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:40px 36px 32px; box-shadow:var(--shadow-lg); position:relative; overflow:hidden;}
.login-card::before{content:''; position:absolute; top:0; left:0; right:0; height:5px; background:linear-gradient(90deg,var(--primary),var(--guinda));}
.login-brand{display:flex; align-items:center; gap:10px; margin-bottom:6px;}
.login-brand .mark{width:34px; height:34px; border-radius:9px; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); display:flex; align-items:center; justify-content:center;}
.login-brand h1{font-family:var(--font-display); font-size:20px; font-weight:700; letter-spacing:.2px;}
.login-sub{color:var(--text-muted); font-size:13.5px; margin-bottom:26px; line-height:1.5;}
.pulse-wrap{height:34px; margin:4px 0 24px; opacity:.85;}
.field-label{font-size:12px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:.06em; margin-bottom:7px; display:block;}
.pass-input{width:100%; padding:13px 14px; border-radius:10px; border:1.5px solid var(--border); background:var(--surface-2); font-size:15px; color:var(--text); outline:none; transition:.15s; letter-spacing:1px;}
.pass-input:focus{border-color:var(--primary); background:var(--surface);}
.login-btn{width:100%; margin-top:16px; padding:13px; border:none; border-radius:10px; background:var(--primary); color:#fff; font-weight:600; font-size:14.5px; transition:.15s;}
.login-btn:hover{background:var(--primary-dark);}
.login-err{color:var(--red); font-size:12.5px; margin-top:10px; min-height:16px;}
.login-foot{margin-top:22px; font-size:11.5px; color:var(--text-faint); text-align:center;}

/* ---------- APP LAYOUT ---------- */
#app{display:none; min-height:100vh;}
#app.show{display:flex;}
.sidebar{width:236px; flex-shrink:0; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; padding:20px 14px; position:sticky; top:0; height:100vh; overflow-y:auto;}
.brand{display:flex; align-items:center; gap:10px; padding:6px 8px 22px;}
.brand .mark{width:30px; height:30px; border-radius:8px; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); flex-shrink:0;}
.brand h1{font-family:var(--font-display); font-size:16.5px; font-weight:700;}
.brand span{display:block; font-size:10px; color:var(--text-faint); letter-spacing:.08em; font-weight:600;}
.nav-group-label{font-size:10.5px; text-transform:uppercase; letter-spacing:.08em; color:var(--text-faint); font-weight:700; margin:16px 10px 6px;}
.nav-item{display:flex; align-items:center; gap:10px; padding:7px 12px 7px 7px; border-radius:9px; color:var(--text-muted); font-size:13.5px; font-weight:500; text-decoration:none; border:none; background:none; width:100%; text-align:left; transition:.12s;}
.nav-icon-chip{width:26px; height:26px; border-radius:7px; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.nav-item svg{width:17px; height:17px; flex-shrink:0;}
.nav-item .nav-icon-chip svg{width:14px; height:14px;}
.nav-item:hover{background:var(--surface-2); color:var(--text);}
.nav-item.active{background:var(--primary-light); color:var(--primary-dark); font-weight:600; box-shadow:inset 3px 0 0 var(--guinda);}
[data-theme="dark"] .nav-item.active{color:var(--primary);}
.sidebar-foot{margin-top:auto; padding-top:14px; border-top:1px solid var(--border);}
.theme-switch{display:flex; background:var(--surface-2); border-radius:9px; padding:3px; gap:2px;}
.theme-switch button{flex:1; padding:7px 0; border:none; background:none; border-radius:7px; font-size:11px; color:var(--text-muted); font-weight:600;}
.theme-switch button.active{background:var(--surface); color:var(--text); box-shadow:var(--shadow);}
.logout-link{margin-top:10px; font-size:12px; color:var(--text-faint); text-align:center; display:block; padding:6px;}
.logout-link:hover{color:var(--red);}

.main{flex:1; min-width:0;}
.topbar{position:sticky; top:0; z-index:20; background:var(--bg); backdrop-filter:blur(6px); display:flex; align-items:center; justify-content:space-between; padding:18px 28px; border-bottom:1px solid transparent;}
.topbar::after{content:''; position:absolute; left:0; right:0; bottom:-1px; height:2px; background:linear-gradient(90deg,var(--primary),var(--guinda) 60%,transparent);}
.topbar h2{font-family:var(--font-display); font-size:22px; font-weight:700;}
.topbar .crumbs{font-size:12.5px; color:var(--text-faint); margin-top:2px;}
.searchbox{display:flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:8px 12px; width:280px;}
.searchbox input{border:none; background:none; outline:none; font-size:13px; width:100%; color:var(--text);}
.searchbox svg{width:15px; height:15px; color:var(--text-faint); flex-shrink:0;}
.content{padding:6px 28px 60px;}

/* ---------- COMPONENTS ---------- */
.grid{display:grid; gap:16px;}
.kpi-grid{grid-template-columns:repeat(4,1fr);}
.card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; box-shadow:var(--shadow);}
.kpi-card{display:flex; flex-direction:column; gap:6px;}
.kpi-top{display:flex; align-items:center; justify-content:space-between;}
.kpi-label{font-size:12px; color:var(--text-muted); font-weight:600;}
.kpi-icon{width:30px; height:30px; border-radius:8px; display:flex; align-items:center; justify-content:center;}
.kpi-icon svg{width:15px; height:15px;}
.kpi-value{font-family:var(--font-display); font-size:26px; font-weight:700; letter-spacing:-.3px;}
.kpi-delta{font-size:11.5px; font-weight:600;}

.section-title{font-family:var(--font-display); font-size:16px; font-weight:700; margin:28px 0 14px; display:flex; align-items:center; justify-content:space-between;}
.two-col{grid-template-columns:1.4fr 1fr;}
.chart-wrap{position:relative; height:230px;}

.dot{width:8px; height:8px; border-radius:50%; display:inline-block; flex-shrink:0;}
.dot-green{background:var(--green);} .dot-amber{background:var(--amber);} .dot-red{background:var(--red);} .dot-blue{background:var(--blue);} .dot-violet{background:var(--violet);}
.followup-bubble{position:fixed; bottom:22px; left:22px; z-index:410; background:var(--surface); border:1.5px solid var(--amber); border-radius:14px; padding:13px 34px 13px 16px; box-shadow:var(--shadow-lg); max-width:300px; animation:fbIn .25s ease;}
.fb-body{display:flex; gap:10px; align-items:flex-start; cursor:pointer;}
.fb-body svg{width:18px; height:18px; color:var(--amber); flex-shrink:0; margin-top:1px;}
.fb-title{font-size:12.5px; font-weight:700; color:var(--text);}
.fb-sub{font-size:10.5px; color:var(--text-muted); margin-top:2px; line-height:1.4;}
.fb-dismiss{position:absolute; top:8px; right:8px; width:18px; height:18px; border:none; background:none; color:var(--text-faint); display:flex; align-items:center; justify-content:center; cursor:pointer;}
.fb-dismiss svg{width:12px; height:12px;}
@keyframes fbIn{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);}}
.monitor-row{display:flex; align-items:flex-start; gap:12px; padding:14px 18px; border-bottom:1px solid var(--border);}
.monitor-row:last-child{border-bottom:none;}
.monitor-live-dot{width:8px; height:8px; border-radius:50%; background:var(--guinda); box-shadow:0 0 0 0 rgba(142,27,60,.5); animation:liveDotPulse 2s infinite;}
@keyframes liveDotPulse{0%{box-shadow:0 0 0 0 rgba(142,27,60,.45);} 70%{box-shadow:0 0 0 7px rgba(142,27,60,0);} 100%{box-shadow:0 0 0 0 rgba(142,27,60,0);}}
.pill{display:inline-flex; align-items:center; gap:6px; padding:4px 10px 4px 8px; border-radius:999px; font-size:11.5px; font-weight:600; white-space:nowrap;}
.pill-green{background:var(--green-bg); color:var(--green);}
.pill-amber{background:var(--amber-bg); color:var(--amber);}
.pill-red{background:var(--red-bg); color:var(--red);}
.pill-blue{background:var(--blue-bg); color:var(--blue);}
.pill-muted{background:var(--surface-2); color:var(--text-muted);}

.table-wrap{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow);}
table{width:100%; border-collapse:collapse; font-size:13px;}
thead th{text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--text-faint); font-weight:700; padding:12px 16px; border-bottom:1px solid var(--border); background:var(--surface-2); white-space:nowrap;}
tbody td{padding:12px 16px; border-bottom:1px solid var(--border); vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
tbody tr{transition:.1s;}
tbody tr.clickable:hover{background:var(--surface-2); cursor:pointer;}
.mono{font-family:var(--font-mono); font-size:12px; color:var(--text-muted);}
.avatar{width:32px; height:32px; border-radius:9px; background:var(--primary-light); color:var(--primary-dark); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; font-family:var(--font-display); flex-shrink:0;}
[data-theme="dark"] .avatar{color:var(--primary);}
.name-cell{display:flex; align-items:center; gap:10px;}
.name-cell .sub{font-size:11.5px; color:var(--text-faint); font-weight:500;}

.toolbar{display:flex; align-items:center; gap:10px; margin-bottom:16px; flex-wrap:wrap;}
.btn{padding:9px 16px; border-radius:9px; border:1px solid var(--border); background:var(--surface); color:var(--text); font-size:13px; font-weight:600; display:inline-flex; align-items:center; gap:7px; transition:.12s;}
.btn:hover{background:var(--surface-2);}
.btn svg{width:14px; height:14px;}
.btn-primary{background:var(--primary); border-color:var(--primary); color:#fff;}
.btn-primary:hover{background:var(--primary-dark);}
.btn-accent{background:var(--accent); border-color:var(--accent); color:#fff;}
.btn-guinda{background:var(--guinda); border-color:var(--guinda); color:#fff;}
.btn-guinda:hover{background:var(--guinda-dark);}
.btn-danger{color:var(--red); border-color:var(--red-bg);}
.btn-danger:hover{background:var(--red-bg);}
.btn-sm{padding:6px 11px; font-size:12px;}
.select, .input{padding:9px 12px; border-radius:9px; border:1px solid var(--border); background:var(--surface); font-size:13px; color:var(--text); outline:none;}
.select:focus, .input:focus{border-color:var(--primary);}
.chip-filter{display:flex; gap:6px; flex-wrap:wrap;}
.chip{padding:6px 12px; border-radius:999px; border:1px solid var(--border); font-size:12px; font-weight:600; color:var(--text-muted); background:var(--surface);}
.chip.active{background:var(--text); color:var(--surface); border-color:var(--text);}

.pagination{display:flex; align-items:center; justify-content:space-between; padding:12px 16px; font-size:12px; color:var(--text-muted);}
.pagination .btns{display:flex; gap:6px;}
.pagination button{width:28px; height:28px; border-radius:7px; border:1px solid var(--border); background:var(--surface);}
.pagination button:disabled{opacity:.4; cursor:default;}

/* drawer / modal */
.overlay{position:fixed; inset:0; background:rgba(10,15,25,.45); z-index:100; display:none;}
.overlay.show{display:block;}
.drawer{position:fixed; top:0; right:0; height:100vh; width:480px; max-width:92vw; background:var(--surface); z-index:101; box-shadow:var(--shadow-lg); transform:translateX(100%); transition:transform .22s ease; display:flex; flex-direction:column;}
.drawer.show{transform:translateX(0);}
.drawer-head{padding:22px 24px; border-bottom:1px solid var(--border); display:flex; align-items:flex-start; justify-content:space-between; gap:12px;}
.drawer-body{padding:22px 24px; overflow-y:auto; flex:1;}
.drawer-close{width:30px; height:30px; border-radius:8px; border:1px solid var(--border); background:var(--surface); display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.drawer-close svg{width:14px; height:14px;}
.tabs{display:flex; gap:4px; border-bottom:1px solid var(--border); margin-bottom:18px;}
.tab-btn{padding:9px 4px; margin-right:18px; font-size:12.5px; font-weight:600; color:var(--text-faint); border:none; background:none; border-bottom:2px solid transparent;}
.tab-btn.active{color:var(--primary); border-color:var(--primary);}
.detail-row{display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); font-size:13px; gap:14px;}
.detail-row .k{color:var(--text-faint); font-weight:500;}
.detail-row .v{text-align:right; font-weight:600;}
.sensitive-mask{font-family:var(--font-mono); letter-spacing:1px;}

.modal{position:fixed; top:50%; left:50%; transform:translate(-50%,-46%); width:640px; max-width:92vw; max-height:88vh; overflow-y:auto; background:var(--surface); border-radius:18px; z-index:101; box-shadow:var(--shadow-lg); display:none;}
.modal.show{display:block;}
.modal-head{padding:22px 26px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; background:var(--surface); z-index:2;}
.modal-body{padding:22px 26px;}
.modal-foot{padding:16px 26px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:10px; position:sticky; bottom:0; background:var(--surface);}
.form-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
.form-field label{font-size:12px; font-weight:600; color:var(--text-muted); margin-bottom:6px; display:block;}
.form-field.full{grid-column:1/-1;}

.step-track{display:flex; gap:6px; margin-bottom:20px;}
.step-track div{flex:1; height:4px; border-radius:3px; background:var(--surface-3);}
.step-track div.done{background:var(--primary);}
.line-item{display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border);}
.line-item .desc{flex:1; font-size:13px; font-weight:500;}
.line-item .cat{font-size:10.5px; color:var(--text-faint);}
.qty-input{width:52px; padding:6px; text-align:center; border-radius:7px; border:1px solid var(--border); background:var(--surface-2);}

.empty-state{text-align:center; padding:60px 20px; color:var(--text-faint);}
.empty-state svg{width:40px; height:40px; margin-bottom:12px; opacity:.5;}

.toast-wrap{position:fixed; bottom:22px; right:22px; z-index:400; display:flex; flex-direction:column; gap:8px;}
.toast{background:var(--text); color:var(--bg); padding:12px 18px; border-radius:10px; font-size:13px; font-weight:500; box-shadow:var(--shadow-lg); display:flex; align-items:center; gap:8px; animation:toastin .2s ease;}
@keyframes toastin{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}

/* ---- search / picker components (wizard) ---- */
.uc-input{text-transform:uppercase;}
.uc-input::placeholder{text-transform:none;}
.picker-wrap{position:relative;}
.picker-results{position:absolute; top:calc(100% + 4px); left:0; right:0; background:var(--surface); border:1px solid var(--border); border-radius:10px; box-shadow:var(--shadow-lg); max-height:260px; overflow-y:auto; z-index:30;}
.picker-empty{padding:14px; font-size:12px; color:var(--text-faint); text-align:center;}
.result-row{display:flex; align-items:center; gap:10px; padding:10px 12px; border-bottom:1px solid var(--border); cursor:pointer; transition:.1s;}
.result-row:last-child{border-bottom:none;}
.result-row:hover{background:var(--surface-2);}
.result-main{flex:1; min-width:0;}
.result-title{font-size:12.5px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.result-sub{font-size:11px; color:var(--text-faint); margin-top:2px; display:flex; align-items:center; gap:6px;}
.result-price{font-size:12px; font-weight:700; color:var(--text-muted); white-space:nowrap;}
.add-circle{width:24px; height:24px; border-radius:50%; background:var(--primary); color:#fff; border:none; font-size:16px; font-weight:600; line-height:1; display:flex; align-items:center; justify-content:center; flex-shrink:0; padding:0;}
.add-circle:hover{background:var(--primary-dark);}
.selected-chip{display:flex; align-items:center; gap:10px; padding:10px 12px; background:var(--primary-light); border:1px solid var(--primary); border-radius:10px; margin-top:8px;}
.selected-chip .avatar{width:26px; height:26px; font-size:10.5px;}
.selected-chip .txt{flex:1; font-size:12.5px; font-weight:600; color:var(--text);}
.selected-chip button{background:none; border:none; color:var(--text-faint); width:22px; height:22px; display:flex; align-items:center; justify-content:center;}
.pill-small{font-size:10px; padding:2px 7px;}
.clausula-row{display:flex; align-items:flex-start; gap:9px; padding:8px 4px; border-bottom:1px solid var(--border); font-size:12px;}
.clausula-row:last-child{border-bottom:none;}
.clausula-row input[type=checkbox]{margin-top:3px; flex-shrink:0;}
.switch{position:relative; width:36px; height:20px; flex-shrink:0;}
.switch input{opacity:0; width:0; height:0;}
.switch .track{position:absolute; inset:0; background:var(--surface-3); border-radius:999px; transition:.15s; cursor:pointer;}
.switch .track:before{content:''; position:absolute; width:14px; height:14px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.15s; box-shadow:0 1px 3px rgba(0,0,0,.3);}
.switch input:checked + .track{background:var(--primary);}
.switch input:checked + .track:before{transform:translateX(16px);}
.mark-toggle{width:22px; height:22px; border:2px solid var(--text-faint); border-radius:6px; display:inline-flex; align-items:center; justify-content:center; cursor:pointer; background:var(--surface); flex-shrink:0; color:#fff; transition:.12s;}
.mark-toggle svg{width:13px; height:13px; stroke-width:3;}
.mark-toggle.active{background:var(--primary); border-color:var(--primary);}
.mark-toggle:hover{border-color:var(--primary);}
.pill-violet{background:var(--violet-light); color:var(--violet);}
.pill-guinda{background:var(--guinda-light); color:var(--guinda);}
.brand-logo{border-radius:8px; object-fit:contain; background:#fff; flex-shrink:0;}
.vitalline{width:100%; height:100%;}
.vitalline path{fill:none; stroke:var(--primary); stroke-width:2; stroke-linecap:round; stroke-linejoin:round;}

@media(max-width:980px){
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
  .two-col{grid-template-columns:1fr;}
  .sidebar{position:fixed; z-index:90; transform:translateX(-100%); transition:.2s;}
  .sidebar.open{transform:translateX(0);}
}
</style>
</head>
<body>

<div id="login-screen">

 original","titulo":"","contexto":"medico"},{"id":"d17de5a3","texto":"🌐 Visita nuestro portal de médicos y regístrate para acceder a quirófanos y beneficios exclusivos: https://quorbitintelligence.github.io/deck/noor/medicos/","default":false,"activa":true,"origen":"Catálogo original","titulo":"","contexto":"medico"},{"id":"9487d2ee","texto":"⏱️ Se autoriza admisión temprana para el paciente y un familiar responsable, un día previo a la cirugía en horario de 19:00 a 20:00 horas; aplicable en procedimientos programados entre las 07:00 y 09:00 horas, cualquier día de la semana.","default":false,"activa":true,"origen":"Catálogo original","titulo":"","contexto":"medico"},{"id":"08cd213f","texto":"🩺 Los honorarios del médico tratante no forman parte de este presupuesto, su coordinación y liquidación deberán gestionarse directamente con el especialista responsable del procedimiento.","default":false,"activa":true,"origen":"Catálogo original","titulo":"","contexto":"medico"},{"id":"adf16d3f","texto":"🏥 Al momento del ingreso, favor de presentar este presupuesto al personal de admisión correspondiente.","default":false,"activa":true,"origen":"Catálogo original","titulo":"","contexto":"medico"},{"id":"aa7b677e","texto":"🗂️ Una vez programado el procedimiento, es indispensable que el médico tratante solicite la lista de materiales y medicamentos asociada a este presupuesto.","default":false,"activa":true,"origen":"Catálogo original","titulo":"","contexto":"medico"},{"id":"d6bce52c","texto":"🔬 Este presupuesto no incluye ningún tipo de aguja para biopsia, como Core o Ultra, que haya sido solicitada por el médico tratante.","default":false,"activa":true,"origen":"Catálogo original","titulo":"","contexto":"medico"},{"id":"32739d03","texto":"🤝 Este presupuesto aplica beneficio de cero descorche, el médico coordinará directamente con su proveedor, quien deberá entregar una remisión 100% requisada, firmada y sellada, por lo que el paciente no realizará ningún pago por concepto de descorche.","default":false,"activa":true,"origen":"Catálogo original","titulo":"","contexto":"medico"},{"id":"652d82ee","texto":"⚙️ Este presupuesto no incluye el servicio del proveedor, la consola Thermablate EAS, el catéter de balón Thermablate desechable, ni la solución térmica integrada al sistema.","default":false,"activa":true,"origen":"Catálogo original","titulo":"","contexto":"medico"},{"id":"a5486efd","texto":"🔩 El movilizador uterino no está contemplado en esta cotización, en caso de requerirse durante el procedimiento, el médico deberá indicarlo oportunamente y su costo será considerado de manera adicional.","default":false,"activa":true,"origen":"Catálogo original","titulo":"","contexto":"medico"},{"id":"425808a4","texto":"⏱️ Como beneficio exclusivo, este presupuesto otorga una hora de quirófano sin costo al programar el procedimiento los días sábado, domingo o lunes, aplicándose dicho descuento a partir de la segunda hora de quirófano.","default":false,"activa":true,"origen":"Catálogo original","titulo":"","contexto":"medico"},{"id":"d34e9b6d","texto":"🔬 En caso de requerirse patología definitiva o estudio transoperatorio, este generará un cargo adicional al presente presupuesto, el cual dependerá del tamaño de las piezas y del tipo de estudio a realizar.","default":false,"activa":true,"origen":"Catálogo original","titulo":"","contexto":"medico"},{"id":"5e04c6f0","texto":"⚙️ El costo del fijador o tackers puede presentar variaciones de costo, ya que este depende tanto del tipo que el médico tratante decida utilizar como de la disponibilidad del proveedor al momento de la cirugía.","default":false,"activa":true,"origen":"Catálogo original","titulo":"","contexto":"medico"},{"id":"84bc0e68","texto":"📋 El presente presupuesto no contempla el servicio del proveedor externo FR Medical correspondiente a toracoscopia.","default":false,"activa":true,"origen":"Catálogo original","titulo":"","contexto":"medico"},{"id":"d1294ff2","texto":"⚡ En caso de no utilizars /* ============ STORAGE (localStorage — funciona igual en Claude, tu equipo o GitHub Pages) ============ */
function lsGet(key){ try{ const v = localStorage.getItem(key); return Promise.resolve(v!=null ? {value:v} : null); }catch(e){ return Promise.resolve(null); } }
function lsSet(key, value){ try{ localStorage.setItem(key, value); return Promise.resolve(true); }catch(e){ return Promise.resolve(false); } }
function lsDelete(key){ try{ localStorage.removeItem(key); }catch(e){} return Promise.resolve(true); }

async function loadSession(){
  try{
    const r = await lsGet('crm_session');
    if(r && r.value){ const v = JSON.parse(r.value); SESSION.authed = !!v.authed; SESSION.theme = v.theme || 'auto'; }
  }catch(e){}
  try{
    const r2 = await lsGet('crm_extra_data');
    if(r2 && r2.value){
      const extra = JSON.parse(r2.value);
      if(extra.cotizaciones) DB.cotizaciones = extra.cotizaciones;
      if(extra.detalle) DB.detalle = extra.detalle;
      if(extra.auditoria) DB.auditoria = extra.auditoria;
      if(extra.bloques) DB.bloques = extra.bloques;
      if(extra.procedimientos) DB.procedimientos = extra.procedimientos;
      if(extra.paquetes) DB.paquetes = extra.paquetes;
      if(extra.listas_materiales) DB.listas_materiales = extra.listas_materiales;
      if(extra.convenios) DB.convenios = extra.convenios;
      if(extra.casos) DB.casos = extra.casos;
      if(extra.cotizaciones_aseguradora) DB.cotizaciones_aseguradora = extra.cotizaciones_aseguradora;
      if(extra.medicos_overrides){
        Object.entries(extra.medicos_overrides).forEach(([id,ov])=>{
          const md = DB.medicos.find(m=>String(m.id)===id);
          if(md) Object.assign(md, ov);
        });
      }
      if(extra.medicos_custom) DB.medicos = DB.medicos.concat(extra.medicos_custom);
      if(extra.conceptos_overrides){
        Object.entries(extra.conceptos_overrides).forEach(([id,ov])=>{
          const co = DB.conceptos.find(c=>String(c.id)===id);
          if(co) Object.assign(co, ov);
        });
      }
      if(extra.conceptos_custom) DB.conceptos = DB.conceptos.concat(extra.conceptos_custom);
      if(extra.clausulas_custom) DB.clausulas = DB.clausulas.concat(extra.clausulas_custom);
      if(extra.clausulas_overrides){
        Object.entries(extra.clausulas_overrides).forEach(([id,ov])=>{
          const cl = DB.clausulas.find(c=>String(c.id)===id);
          if(cl){ cl.default = !!ov.default; cl.activa = ov.activa!==false; }
        });
      }
    }
  }catch(e){}
}

function normalizeText(s){ return (s==null?'':String(s)).normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase(); }
function fuzzyMatch(haystack, query){
  if(!query) return true;
  const h = normalizeText(haystack);
  const tokens = normalizeText(query).split(/\s+/).filter(Boolean);
  return tokens.every(t=>h.includes(t));
}

function paginate(arr, page, perPage){ const start=(page-1)*perPage; return arr.slice(start,start+perPage); }
function paginationControls(containerId, total, page, perPage, onPage){
  const pages = Math.max(1, Math.ceil(total/perPage));
  const el = document.getElementById(containerId);
  if(!el) return;
  el.innerHTML = `<span>${total} registros · página ${page} de ${pages}</span>
    <div class="btns">
      <button ${page<=1?'disabled':''} id="pg-prev">${icon('chevron','')}</button>
      <button ${page>=pages?'disabled':''} id="pg-next">‹›</button>
    </div>`;
  el.querySelector('#pg-prev').style && (el.querySelector('#pg-prev').innerHTML = '‹');
  const nextBtn = el.querySelector('#pg-next'); nextBtn.innerHTML='›';
  el.querySelector('#pg-prev').onclick = ()=>{ if(page>1) onPage(page-1); };
  nextBtn.onclick = ()=>{ if(page<pages) onPage(page+1); };
}

/* Buscador de conceptos reutilizable: input + panel de resultados + callback onPick(idConcepto) */
function wireConceptPicker(searchEl, resultsEl, onPick, opts){
  opts = opts || {};
  searchEl.oninput = ()=>{
    const q = searchEl.value;
    if(q.trim().length<1){ resultsEl.style.display='none'; resultsEl.innerHTML=''; return; }
    const res = DB.conceptos.filter(c=>c.activo!==false && (fuzzyMatch(c.descripcion,q)||fuzzyMatch(c.id,q))).slice(0, opts.limit||10);
    resultsEl.innerHTML = res.length ? res.map(c=>`
      <div class="result-row" data-pick="${c.id}">
        <div class="result-main"><div class="result-title">${c.descripcion}</div>
          <div class="result-sub"><span class="pill pill-blue pill-small">${c.categoria}</span>${c.grupo_eleccion?`<span class="pill pill-violet pill-small">Grupo: ${c.grupo_eleccion}</span>`:''}</div></div>
        <div class="result-price">${fmtMoney(c.costo_sin_iva)}</div>
        <button class="add-circle" type="button">+</button>
      </div>`).join('') : `<div class="picker-empty">Sin coincidencias para "${q}"</div>`;
    resultsEl.style.display='block';
    resultsEl.querySelectorAll('[data-pick]').forEach(row=> row.onclick = ()=>{ onPick(row.dataset.pick); resultsEl.style.display='none'; searchEl.value=''; });
  };
  document.addEventListener('click', e=>{ if(!e.target.closest('.picker-wrap')){ resultsEl.style.display='none'; } });
}

function renderConceptSelection(containerEl, selMap, onChange){

  containerEl.querySelectorAll('[data-qty]').forEach(inp=> inp.onchange = ()=>{ selMap[inp.dataset.qty] = Math.max(1, parseInt(inp.value)||1); onChange&&onChange(); renderConceptSelection(containerEl, selMap, onChange); });
  containerEl.querySelectorAll('[data-rm]').forEach(b=> b.onclick = ()=>{ delete selMap[b.dataset.rm]; onChange&&onChange(); renderConceptSelection(containerEl, selMap, onChange); });

/* Buscador + checklist de condiciones, reutilizable */
function wireClausulaPicker(searchEl, listEl, selMap, onToggle, contexto){
  const draw = (filter)=>{
    let active = DB.clausulas.filter(c=>c.activa!==false);
    if(contexto) active = active.filter(c=> !c.contexto || c.contexto===contexto || c.contexto==='ambos');
    const items = filter ? active.filter(c=>fuzzyMatch(c.texto,filter)||fuzzyMatch(c.titulo,filter)) : active;
    listEl.innerHTML = items.length ? items.map(cl=>`
      <label class="clausula-row" style="cursor:pointer;">
        <input type="checkbox" data-cl="${cl.id}" ${selMap[cl.id]?'checked':''}>
        <span>${cl.titulo?`<b>${cl.titulo}:</b> `:''}${cl.texto}${cl.default?' <span class="pill pill-green pill-small">Predeterminada</span>':''}</span>
      </label>`).join('') : `<div class="picker-empty">Sin condiciones que coincidan.</div>`;
    listEl.querySelectorAll('input[type=checkbox]').forEach(cb=> cb.onchange = ()=>{ selMap[cb.dataset.cl] = cb.checked; onToggle&&onToggle(); });
  };
  draw('');
  searchEl.oninput = ()=> draw(searchEl.value);
  return draw;
}

  const casosAbiertos = DB.casos.filter(cs=>!['Realizado','Cancelado','Perdido'].includes(cs.estatus)).length;
  const cirugiasProgramadas = DB.casos.filter(cs=>cs.fecha_programacion).length;

  const porEstatus = {}; cots.forEach(c=>{ porEstatus[c.estatus] = (porEstatus[c.estatus]||0)+1; });
  const porMedEstatus = {}; DB.medicos.forEach(m=>{ porMedEstatus[m.estatus_relacion] = (porMedEstatus[m.estatus_relacion]||0)+1; });
  const porConvEstatus = {}; DB.convenios.forEach(cv=>{ const e=computeConvenioEstatus(cv); porConvEstatus[e]=(porConvEstatus[e]||0)+1; });
  const porCasoEstatus = {}; DB.casos.forEach(cs=>{ porCasoEstatus[cs.estatus]=(porCasoEstatus[cs.estatus]||0)+1; });
  const porPaqEstatus = { 'Activo': paquetesActivos, 'Inactivo': DB.paquetes.length-paquetesActivos };

  const espMonto = {};
  cots.forEach(c=>{ const m = medicoById(c.id_medico); const esp = m ? m.especialidad : (c.especialidad||'Sin especificar'); espMonto[esp] = (espMonto[esp]||0) + (c.costo_propuesta||0); });
  const topEsp = Object.entries(espMonto).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const porMes = {};
  cots.forEach(c=>{ if(!c.fecha_creacion) return; const d = new Date(c.fecha_creacion); const key = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); porMes[key]=porMes[key]||{count:0,monto:0}; porMes[key].count++; porMes[key].monto+=(c.costo_propuesta||0); });
  const meses = Object.keys(porMes).sort();
  const hoy = new Date();
  const monitorCasos = DB.casos.filter(cs=>cs.proxima_accion_fecha && !['Realizado','Cancelado','Perdido'].includes(cs.estatus))
    .map(c=>({...c,d:new Date(c.proxima_accion_fecha)})).sort((a,b)=>a.d-b.d);

  function monitorRowHtml(cs){
    const m = medicoById(cs.id_medico);
    const cot = cs.id_cotizacion ? DB.cotizaciones.find(x=>String(x.id)===String(cs.id_cotizacion)) : null;
    const procedimiento = cot ? cot.procedimiento : cs.titulo;
    const overdue = cs.d < hoy;
    const cv = cs.convenio_id ? DB.convenios.find(x=>x.id===cs.convenio_id) : null;
    return `<div class="monitor-row" style="font-size:11px;">
      <div class="avatar" style="flex-shrink:0; width:30px; height:30px; font-size:10.5px;">${m?initials(m.nombre):'—'}</div>
      <div style="flex:1; min-width:0;">
        <div style="font-weight:700; font-size:11px;">${m?m.nombre:'—'}</div>
        <div style="font-size:11px; color:var(--text-muted); margin-top:1px;">${procedimiento}${cs.id_cotizacion?` <span class="mono" style="color:var(--text-faint); font-size:11px;">· ${cs.id_cotizacion}</span>`:''}</div>
        <div style="display:flex; gap:6px; margin-top:6px; flex-wrap:wrap; align-items:center;">
          <span class="pill pill-${overdue?'red':'amber'} pill-small" style="font-size:11px;">${cs.proxima_accion_nota?cs.proxima_accion_nota+' · ':''}${fmtDate(cs.proxima_accion_fecha)}</span>
          ${cv ? `<span class="pill pill-green pill-small" style="font-size:11px;">${cv.nombre}</span>` : `<button class="btn btn-sm btn-guinda" style="padding:3px 10px; font-size:11px;" onclick="openConvenioModal(null,'${cs.id_medico}')">Negociar convenio</button>`}
        </div>
      </div>
      <div style="display:flex; flex-direction:column; gap:6px; flex-shrink:0;">
        <button class="btn btn-sm" style="font-size:11px;" onclick="openCasoDrawer('${cs.id}')">Ver caso</button>
        <button class="btn btn-sm btn-primary" style="font-size:11px;" onclick="atenderAccionMonitor('${cs.id}')">${icon('check')} Atender</button>
      </div>
    </div>`;
  }
  const colA = monitorCasos.filter((_,i)=>i%2===0);
  const colB = monitorCasos.filter((_,i)=>i%2===1);

  document.getElementById('content').innerHTML = `
    <div class="section-title" style="margin:0 0 12px; display:flex; align-items:center; gap:8px;">
      <span class="monitor-live-dot"></span> Monitor de próximas acciones (CRM) <span class="pill pill-blue pill-small" style="font-size:11px;">${monitorCasos.length}</span>
    </div>
    <div class="card" style="padding:0; margin-bottom:22px;">
      ${monitorCasos.length ? `<div style="display:grid; grid-template-columns:1fr 1fr;">
          <div style="border-right:1px solid var(--border);">${colA.map(monitorRowHtml).join('') || emptyMini('Sin registros.')}</div>
          <div>${colB.map(monitorRowHtml).join('') || emptyMini('Sin registros.')}</div>
        </div>`
        : `<div class="empty-state">${icon('followup')}<div>Sin acciones pendientes por atender.</div></div>`}
    </div>

    <div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(155px,1fr)); gap:10px;">
      ${miniKpi('Cotizaciones', cots.length, 'quote', 'primary')}
      ${miniKpi('Monto cotizado', fmtMoney(totalMonto), 'bolt', 'accent')}
      ${miniKpi('Tasa aprobación', tasaAprob+'%', 'check', 'green')}
      ${miniKpi('Médicos activos', medicosActivos+'/'+DB.medicos.length, 'doctor', 'violet')}
      ${miniKpi('Médicos dados de alta', DB.medicos.length, 'doctor', 'blue')}
      ${miniKpi('Paquetes', paquetesActivos+'/'+DB.paquetes.length, 'building', 'primary')}
      ${miniKpi('Procedimientos', procActivos+'/'+DB.procedimientos.length, 'bolt', 'accent')}
      ${miniKpi('Listas de materiales', listasActivas, 'catalog', 'violet')}
      ${miniKpi('Convenios vigentes', conveniosActivos+'/'+DB.convenios.length, 'deals', 'green')}
      ${miniKpi('Casos CRM abiertos', casosAbiertos+'/'+DB.casos.length, 'followup', 'guinda')}
      ${miniKpi('Cirugías programadas', cirugiasProgramadas, 'bolt', 'violet')}
    </div>

    ${!cots.length ? `<div class="card" style="margin-top:14px; text-align:center; padding:20px 20px;">
      <div style="font-size:12.5px; color:var(--text-muted);">Aún no hay cotizaciones — las gráficas de abajo se van a ir llenando conforme captures.</div>
      <button class="btn btn-primary btn-sm" style="margin-top:10px;" onclick="openCotizacionWizard()">${icon('plus')} Crear la primera cotización</button>
    </div>` : ''}

    <div class="section-title" style="margin:20px 0 12px;">Semáforos del negocio</div>
    <div class="grid" style="grid-template-columns:repeat(5,1fr); gap:10px;">
      ${bubbleDonutCard('cots', 'Cotizaciones', porEstatus, ESTADOS_COT)}
      ${bubbleDonutCard('meds', 'Médicos', porMedEstatus, ESTADOS_MED)}
      ${bubbleDonutCard('paq', 'Paquetes', porPaqEstatus, {'Activo':{color:'green'},'Inactivo':{color:'red'}})}
      ${bubbleDonutCard('conv', 'Convenios', porConvEstatus, ESTADOS_CONVENIO)}
      ${bubbleDonutCard('casos', 'Casos CRM', porCasoEstatus, ESTADOS_CASO)}
    </div>

    <div class="section-title" style="margin:20px 0 12px;">Cotizaciones por mes y por especialidad</div>
    <div class="grid two-col">
      <div class="card"><div style="font-weight:700; font-size:13px; margin-bottom:10px;">Cotizaciones por mes</div><div class="chart-wrap" style="height:190px;"><canvas id="chart-mes"></canvas></div></div>
      <div class="card"><div style="font-weight:700; font-size:13px; margin-bottom:10px;">Monto cotizado por especialidad</div><div class="chart-wrap" style="height:190px;"><canvas id="chart-esp"></canvas></div></div>
    </div>
  `;

  function chartFallback(el, msg){
    if(!el) return;
    el.innerHTML = `<div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; text-align:center; padding:0 12px; gap:6px;">
      <span style="font-size:11.5px; color:var(--text-muted); font-weight:600;">${msg}</span>
      <button class="btn btn-sm" onclick="renderDashboard()">Reintentar</button>
    </div>`;
  }
  const chartsOk = typeof Chart !== 'undefined';
  if(!chartsOk){
    chartFallback(document.getElementById('chart-mes')?.closest('.chart-wrap'), 'No se pudo cargar la librería de gráficas (Chart.js). Revisa tu conexión a internet o si tu red bloquea cdnjs.cloudflare.com.');
    chartFallback(document.getElementById('chart-esp')?.closest('.chart-wrap'), 'No se pudo cargar la librería de gráficas.');
  } else if(cots.length){
    try{
      new Chart(document.getElementById('chart-mes'), { type:'bar', data:{ labels: meses.map(fmtMesLabel), datasets:[{label:'Monto', data: meses.map(m=>porMes[m].monto), backgroundColor: cssVar('--primary'), borderRadius:6}]},
        options:{ maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ y:{ticks:{callback:v=>fmtMoney(v), font:{size:10}}, grid:{color:cssVar('--border')}}, x:{ticks:{font:{size:10}}, grid:{display:false}} } } });
    }catch(e){ chartFallback(document.getElementById('chart-mes')?.closest('.chart-wrap'), 'No se pudo dibujar esta gráfica.'); }
    try{
      new Chart(document.getElementById('chart-esp'), { type:'bar', data:{ labels: topEsp.map(e=>e[0]), datasets:[{ data: topEsp.map(e=>e[1]), backgroundColor: cssVar('--violet'), borderRadius:6 }]},
        options:{ maintainAspectRatio:false, indexAxis:'y', plugins:{legend:{display:false}}, scales:{ x:{ticks:{callback:v=>fmtMoney(v), font:{size:10}}, grid:{color:cssVar('--border')}}, y:{grid:{display:false}, ticks:{font:{size:10}}} } } });
    }catch(e){ chartFallback(document.getElementById('chart-esp')?.closest('.chart-wrap'), 'No se pudo dibujar esta gráfica.'); }
  } else {
    chartFallback(document.getElementById('chart-mes')?.closest('.chart-wrap'), 'Sin datos aún');
    chartFallback(document.getElementById('chart-esp')?.closest('.chart-wrap'), 'Sin datos aún');
  }
  if(chartsOk){
    ['cots','meds','paq','conv','casos'].forEach(key=>{
      const canvas = document.getElementById('donut-'+key);
      if(canvas){
        try{
          const labels = JSON.parse(canvas.dataset.labels||'[]');
          const values = JSON.parse(canvas.dataset.values||'[]');
          const colors = JSON.parse(canvas.dataset.colors||'[]');
          if(values.reduce((a,b)=>a+b,0) > 0){
            new Chart(canvas, { type:'doughnut', data:{ labels, datasets:[{ data:values, backgroundColor:colors, borderWidth:2, borderColor:cssVar('--surface') }]},
              options:{ maintainAspectRatio:false, cutout:'68%', plugins:{legend:{display:false}, tooltip:{enabled:true}} } });
          }
        }catch(e){}
      }
    });
  }
}
function miniKpi(label,value,ic,tone){ return `<div class="card kpi-card" style="padding:12px 14px;">
  <div class="kpi-top"><span class="kpi-label" style="font-size:10.5px;">${label}</span>
  <div class="kpi-icon" style="width:24px;height:24px; background:var(--${tone}-light,var(--surface-2)); color:var(--${tone});">${icon(ic)}</div></div>
  <div class="kpi-value" style="font-size:19px;">${value}</div></div>`; }
function bubbleDonutCard(key, title, dataObj, colorMap){
  const labels = Object.keys(dataObj).filter(k=>dataObj[k]);
  const values = labels.map(k=>dataObj[k]);
  const total = values.reduce((a,b)=>a+b,0);
  const colors = labels.map(k=>{
    const c = (colorMap[k]||{}).color || 'muted';
    return cssVar('--'+(c==='muted'?'text-faint':c));
  });
  const legend = labels.map((k,i)=>{
    const c = (colorMap[k]||{}).color || 'muted';
    return `<div style="display:flex; align-items:center; gap:5px; font-size:9.5px; color:var(--text-muted); margin-top:2px;"><span class="dot dot-${c==='muted'?'blue':c}" style="width:6px;height:6px;"></span>${k} (${values[i]})</div>`;
  }).join('');
  return `<div class="card" style="text-align:center; padding:12px 10px;">
    <div style="font-weight:700; font-size:11.5px; margin-bottom:6px;">${title}</div>
    <div style="position:relative; height:86px;">
      <canvas id="donut-${key}" data-labels='${JSON.stringify(labels)}' data-values='${JSON.stringify(values)}' data-colors='${JSON.stringify(colors)}'></canvas>
      <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-weight:700; font-size:17px; pointer-events:none;">${total}</div>
    </div>
    <div style="max-height:60px; overflow-y:auto; margin-top:6px; text-align:left;">${legend || '<div style="font-size:9.5px; color:var(--text-faint);">Sin datos</div>'}</div>
  </div>`;
}
function kpiCard(label,value,ic,tone){ return `<div class="card kpi-card"><div class="kpi-top"><span class="kpi-label">${label}</span>
  <div class="kpi-icon" style="background:var(--${tone}-light,var(--surface-2)); color:var(--${tone});">${icon(ic)}</div></div><div class="kpi-value">${value}</div></div>`; }
function semaforoCard(label,count,color){ return `<div class="card" style="text-align:center; padding:16px 10px;">
  <div class="dot dot-${color}" style="width:10px;height:10px;margin:0 auto 8px;"></div>
  <div style="font-family:var(--font-display); font-size:22px; font-weight:700;">${count||0}</div>
  <div style="font-size:11px; color:var(--text-faint); font-weight:600; margin-top:2px;">${label}</div></div>`; }
function cssVar(name){ return getComputedStyle(document.documentElement).getPropertyValue(name).trim() || '#999'; }
function fmtMesLabel(key){ const [y,m]=key.split('-'); const meses=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic']; return meses[parseInt(m)-1]+' '+y.slice(2); }

let medState = { page:1, perPage:9, search:'', estatus:'todos', esp:'todas', verInactivos:false };
function renderMedicos(){
  document.getElementById('content').innerHTML = `
    <div class="toolbar">
      <div class="searchbox" style="width:260px;">${icon('search')}<input id="medico-search" placeholder="Buscar médico…" value="${medState.search}"></div>
      <select class="select" id="medico-esp-filter"><option value="todas">Todas las especialidades</option>
        ${[...new Set(DB.medicos.map(m=>m.especialidad))].sort().map(e=>`<option ${medState.esp===e?'selected':''}>${e}</option>`).join('')}</select>
      <div class="chip-filter" id="medico-chips">
        ${['todos','TRABAJANDO','NUEVO REGISTRO','EN NEGOCIACIÓN','CON CONVENIO','MÉDICO INACTIVO'].map(s=>
          `<button class="chip ${medState.estatus===s?'active':''}" data-s="${s}">${s==='todos'?'Todos':s}</button>`).join('')}
      </div>
      <label style="display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-muted); font-weight:600;"><input type="checkbox" id="medico-ver-inactivos" ${medState.verInactivos?'checked':''}> Ver dados de baja</label>
      <button class="btn btn-primary" style="margin-left:auto;" onclick="openMedicoModal()">${icon('plus')} Nuevo médico</button>
    </div>
    <div class="table-wrap">
      <table><thead><tr><th>Médico</th><th>Estatus</th><th>Contacto</th><th>Cotizaciones</th><th>Credencial</th></tr></thead>
      <tbody id="medicos-tbody"></tbody></table>
      <div class="pagination" id="medicos-pg"></div>
    </div>`;
  document.getElementById('medico-search').oninput = e=>{ medState.search=e.target.value; medState.page=1; drawMedTable(); };
  document.getElementById('medico-esp-filter').onchange = e=>{ medState.esp=e.target.value; medState.page=1; drawMedTable(); };
  document.getElementById('medico-chips').querySelectorAll('.chip').forEach(b=> b.onclick=()=>{ medState.estatus=b.dataset.s; medState.page=1; drawMedTable(); });
  document.getElementById('medico-ver-inactivos').onchange = e=>{ medState.verInactivos=e.target.checked; medState.page=1; drawMedTable(); };
  drawMedTable();
}
function drawMedTable(){
  let list = DB.medicos.filter(m=>{
    if(!medState.verInactivos && m.activo===false) return false;
    if(medState.search && !fuzzyMatch(m.nombre, medState.search)) return false;
    if(medState.estatus!=='todos' && m.estatus_relacion!==medState.estatus) return false;
    if(medState.esp!=='todas' && m.especialidad!==medState.esp) return false;
    return true;
  });
  document.getElementById('medico-chips').querySelectorAll('.chip').forEach(b=>b.classList.toggle('active', b.dataset.s===medState.estatus));
  const page = paginate(list, medState.page, medState.perPage);
  document.getElementById('medicos-tbody').innerHTML = page.length ? page.map(m=>{
    const nCot = DB.cotizaciones.filter(c=>String(c.id_medico)===String(m.id)).length;
    return `<tr class="clickable" data-id="${m.id}">
      <td><div class="name-cell"><div class="avatar">${initials(m.nombre)}</div>
        <div><div style="font-weight:600;">${m.nombre}${m.activo===false?' <span class="pill pill-red pill-small">De baja</span>':''}</div><div class="sub">${m.especialidad}</div></div></div></td>
      <td>${pillMed(m.estatus_relacion)}</td>
      <td style="font-size:12.5px; color:var(--text-muted);">${m.telefono?('📞 '+m.telefono):'Sin teléfono'}</td>
      <td>${nCot}</td>
      <td><span class="pill ${m.estatus_credencializacion==='CREDENCIALIZADO'?'pill-green':'pill-muted'}">${m.estatus_credencializacion}</span></td>
    </tr>`;
  }).join('') : `<tr><td colspan="5"><div class="empty-state">${icon('doctor')}<div>No se encontraron médicos con esos filtros.</div></div></td></tr>`;
  document.querySelectorAll('#medicos-tbody tr.clickable').forEach(tr=> tr.onclick=()=>openMedicoDrawer(tr.dataset.id));
  paginationControls('medicos-pg', list.length, medState.page, medState.perPage, p=>{ medState.page=p; drawMedTable(); });
}
function openMedicoDrawer(id){

    </div>`);
  const paneInfo = `
    <div class="detail-row"><span class="k">Correo</span><span class="v">${m.correo || 'Sin credencializar'}</span></div>
    <div class="detail-row"><span class="k">Teléfono</span><span class="v">${m.telefono || '—'}</span></div>

    <div class="detail-row"><span class="k">Cédulas 🔒</span><span class="v sensitive-mask">${maskCedula(m.cedulas_raw)}</span></div>

    <div style="margin-top:16px; display:flex; gap:8px; flex-wrap:wrap;">
      <button class="btn btn-primary btn-sm" onclick="openCotizacionWizard('${m.id}')">${icon('plus')} Nueva cotización</button>
      <button class="btn btn-sm" onclick="openCasoModal(null,'${m.id}')">${icon('followup')} Nuevo caso CRM</button>
    </div>
    <div style="margin-top:8px; display:flex; gap:8px; flex-wrap:wrap;">
      <button class="btn btn-sm" onclick="closeDrawer();openMedicoModal('${m.id}')">${icon('config')} Editar médico</button>
      ${m.activo===false
        ? `<button class="btn btn-sm" onclick="reactivarMedico('${m.id}')">${icon('check')} Reactivar</button>`
        : `<button class="btn btn-sm btn-danger" onclick="eliminarMedico('${m.id}')">${icon('trash')} Dar de baja</button>`}
    </div>`;
  const paneCot = cotz.length ? cotz.map(c=>`
    <div class="line-item" style="cursor:pointer;" onclick="closeDrawer();openCotizacionDrawer('${c.id}')">
      <div class="desc">${c.procedimiento}<div class="cat mono">${c.id} · ${fmtDate(c.fecha_creacion)}</div></div>
      <div style="text-align:right;">${pillCot(c.estatus)}<div style="font-weight:700; font-size:12.5px; margin-top:4px;">${fmtMoney(c.costo_propuesta)}</div></div>
    </div>`).join('') : emptyMini('Sin cotizaciones registradas.');
  const paneConv = conv.length ? conv.map(c=>`

  const panes = {info:paneInfo, cot:paneCot, conv:paneConv, seg:paneSeg};

function emptyMini(text){ return `<div style="text-align:center; color:var(--text-faint); font-size:12.5px; padding:26px 0;">${text}</div>`; }
function openMedicoModal(id){
  const m = id ? medicoById(id) : null;
  openModal(`
    <div class="modal-head"><div style="font-weight:700; font-size:16px;">${m?'Editar médico':'Nuevo médico'}</div><button class="drawer-close" onclick="closeModal()">${icon('x')}</button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-field full"><label>Nombre completo</label><input class="input uc-input" id="md-nombre" style="width:100%;" value="${m?m.nombre:''}" placeholder="DR. NOMBRE APELLIDO APELLIDO"></div>
        <div class="form-field full"><label>Especialidad</label>
          <input class="input uc-input" id="md-especialidad" style="width:100%;" list="md-esp-list" value="${m?m.especialidad:''}" placeholder="EJ. CIRUGÍA GENERAL">
          <datalist id="md-esp-list">${[...new Set(DB.especialidades.map(e=>e.nombre))].sort().map(n=>`<option value="${n}">`).join('')}</datalist>
        </div>
        <div class="form-field"><label>Correo electrónico</label><input class="input" type="email" id="md-correo" style="width:100%;" value="${m&&m.correo?m.correo:''}" placeholder="correo@ejemplo.com"></div>
        <div class="form-field"><label>Teléfono</label><input class="input" id="md-telefono" style="width:100%;" value="${m?m.telefono||'':''}" placeholder="55 0000 0000"></div>
        <div class="form-field"><label>Estatus de relación</label><select class="select" id="md-estatus-rel" style="width:100%;">
          ${Object.keys(ESTADOS_MED).map(s=>`<option ${m&&m.estatus_relacion===s?'selected':(!m&&s==='NUEVO REGISTRO'?'selected':'')}>${s}</option>`).join('')}</select></div>
        <div class="form-field"><label>Estatus de credencialización</label><select class="select" id="md-estatus-cred" style="width:100%;">
          ${['SIN CREDENCIALIZAR','EN PROCESO','CREDENCIALIZADO'].map(s=>`<option ${m&&m.estatus_credencializacion===s?'selected':(!m&&s==='SIN CREDENCIALIZAR'?'selected':'')}>${s}</option>`).join('')}</select></div>
        <div class="form-field full"><label>Cédula(s) profesional(es) 🔒</label><input class="input" id="md-cedulas" style="width:100%;" value="${m?m.cedulas_raw||'':''}" placeholder="Número(s) de cédula"></div>
      </div>
    </div>
    <div class="modal-foot"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" id="md-save">Guardar médico</button></div>`);
  document.getElementById('md-save').onclick = ()=>{
    const nombre = document.getElementById('md-nombre').value.trim();
    const especialidad = document.getElementById('md-especialidad').value.trim();
    if(!nombre || !especialidad){ toast('Captura al menos el nombre y la especialidad'); return; }
    const payload = {
      nombre, especialidad,
      correo: document.getElementById('md-correo').value.trim() || null,
      telefono: document.getElementById('md-telefono').value.trim() || null,
      estatus_relacion: document.getElementById('md-estatus-rel').value,
      estatus_credencializacion: document.getElementById('md-estatus-cred').value,
      cedulas_raw: document.getElementById('md-cedulas').value.trim() || null,
      activo: true
    };
    if(m){
      Object.assign(m, payload); m.__edited = true;
      logAudit('Médico', m.id, 'Edición', nombre);
    } else {
      const nuevo = Object.assign({ id: uid('MED').toUpperCase(), revisado:false, __new:true }, payload);
      DB.medicos.push(nuevo);
      logAudit('Médico', nuevo.id, 'Alta', nombre+' — '+especialidad);
    }
    persistExtra(); closeModal(); toast('Médico guardado'); renderMedicos();
  };
}
function eliminarMedico(id){
  const m = medicoById(id); if(!m) return;
  if(!confirm('¿Dar de baja a '+m.nombre+'? Su historial de cotizaciones y casos se conserva, pero dejará de aparecer en las listas activas.')) return;
  m.activo = false; if(!m.__new) m.__edited = true;
  logAudit('Médico', id, 'Baja', m.nombre);
  persistExtra(); toast('Médico dado de baja'); closeDrawer(); renderMedicos();
}
function reactivarMedico(id){
  const m = medicoById(id); if(!m) return;
  m.activo = true; if(!m.__new) m.__edited = true;
  logAudit('Médico', id, 'Reactivación', m.nombre);
  persistExtra(); toast('Médico reactivado'); openMedicoDrawer(id); renderMedicos();
}
function medicoChipHtml(m){
  if(!m) return '';
  return `<div class="selected-chip"><div class="avatar">${initials(m.nombre)}</div>
    <div class="txt">${m.nombre}<div style="font-weight:500; color:var(--text-faint); font-size:11px;">${m.especialidad}</div></div>
    <button type="button">${icon('x')}</button></div>`;
}

/* ============================================================
   CATÁLOGO DE CONCEPTOS (con CRUD, estatus, agrupamiento)
============================================================ */
let catState = { page:1, perPage:10, search:'', cat:'todas', estatus:'activos', agrupar:false };
function renderCatalogo(){
  const cats = [...new Set(DB.conceptos.map(c=>c.categoria))];
  document.getElementById('content').innerHTML = `
    <div class="toolbar">
      <div class="searchbox" style="width:240px;">${icon('search')}<input id="cat-search" placeholder="Buscar concepto…"></div>
      <div class="chip-filter" id="cat-chips">
        <button class="chip active" data-c="todas">Todas</button>
        ${cats.map(c=>`<button class="chip" data-c="${c}">${c}</button>`).join('')}
      </div>
      <select class="select" id="cat-estatus-filter"><option value="activos">Activos</option><option value="inactivos">Inactivos</option><option value="todos">Todos</option></select>
      <label style="display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-muted); font-weight:600;"><input type="checkbox" id="cat-agrupar"> Agrupar por elección</label>
      <button class="btn btn-primary" style="margin-left:auto;" onclick="openConceptoModal()">${icon('plus')} Nuevo concepto</button>
    </div>
    <div class="table-wrap"><div id="cat-body"></div><div class="pagination" id="cat-pg"></div></div>`;
  document.getElementById('cat-search').oninput = e=>{ catState.search=e.target.value; catState.page=1; drawCatTable(); };
  document.getElementById('cat-chips').querySelectorAll('.chip').forEach(b=> b.onclick=()=>{ catState.cat=b.dataset.c; catState.page=1; document.getElementById('cat-chips').querySelectorAll('.chip').forEach(x=>x.classList.toggle('active',x===b)); drawCatTable(); });
  document.getElementById('cat-estatus-filter').onchange = e=>{ catState.estatus=e.target.value; catState.page=1; drawCatTable(); };
  document.getElementById('cat-agrupar').onchange = e=>{ catState.agrupar=e.target.checked; drawCatTable(); };
  drawCatTable();
}
function catRowHtml(c){
  return `<tr class="clickable" data-id="${c.id}">
    <td class="mono">${c.id}</td><td style="font-weight:500;">${c.descripcion}</td>
    <td><span class="pill pill-blue">${c.categoria}</span></td>
    <td>${c.grupo_eleccion?`<span class="pill pill-violet">${c.grupo_eleccion}</span>`:'<span style="color:var(--text-faint);">—</span>'}</td>
    <td style="font-weight:600;">${fmtMoney(c.costo_sin_iva)}</td>
    <td><span class="pill ${c.activo!==false?'pill-green':'pill-red'}">${c.activo!==false?'Activo':'Inactivo'}</span></td>
    <td onclick="event.stopPropagation()"><button class="btn btn-sm" onclick="openConceptoModal('${c.id}')">${icon('config')}</button></td>
  </tr>`;
}
function drawCatTable(){
  let list = DB.conceptos.filter(c=>{
    if(catState.search && !fuzzyMatch(c.descripcion, catState.search) && !fuzzyMatch(c.id, catState.search)) return false;
    if(catState.cat!=='todas' && c.categoria!==catState.cat) return false;
    if(catState.estatus==='activos' && c.activo===false) return false;
    if(catState.estatus==='inactivos' && c.activo!==false) return false;
    return true;
  });
  const body = document.getElementById('cat-body');
  const head = `<table><thead><tr><th>ID</th><th>Concepto</th><th>Categoría</th><th>Grupo de elección</th><th>Costo</th><th>Estatus</th><th></th></tr></thead><tbody>`;
  if(catState.agrupar){
    const groups = {};
    list.forEach(c=>{ const g = c.grupo_eleccion || 'Sin grupo'; (groups[g]=groups[g]||[]).push(c); });
    let rows = '';
    Object.keys(groups).sort().forEach(g=>{
      rows += `<tr><td colspan="7" style="background:var(--surface-2); font-weight:700; font-size:11.5px; text-transform:uppercase; letter-spacing:.04em; color:var(--text-muted);">${g} (${groups[g].length})</td></tr>`;
      groups[g].forEach(c=> rows += catRowHtml(c));
    });
    body.innerHTML = list.length ? head+rows+'</tbody></table>' : `<div class="empty-state">${icon('catalog')}<div>Sin conceptos que coincidan.</div></div>`;
    document.getElementById('cat-pg').innerHTML='';
  } else {
    const page = paginate(list, catState.page, catState.perPage);
    body.innerHTML = page.length ? head + page.map(catRowHtml).join('') + '</tbody></table>' : `<div class="empty-state">${icon('catalog')}<div>Sin conceptos que coincidan.</div></div>`;
    paginationControls('cat-pg', list.length, catState.page, catState.perPage, p=>{ catState.page=p; drawCatTable(); });
  }
}

    <div class="modal-head"><div style="font-weight:700; font-size:16px;">${c?'Editar concepto':'Nuevo concepto'}</div><button class="drawer-close" onclick="closeModal()">${icon('x')}</button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-field full"><label>Descripción</label><input class="input uc-input" id="cc-desc" style="width:100%;" value="${c?c.descripcion:''}" placeholder="EJ. SALA DE CIRUGÍA POR HORA"></div>
        <div class="form-field"><label>Categoría</label><select class="select" id="cc-cat" style="width:100%;">
          ${['Medicamento','Material/Insumo','Equipo','Sala/Equipo','Servicio','Lista completa','Otro'].map(x=>`<option ${c&&c.categoria===x?'selected':''}>${x}</option>`).join('')}</select></div>
        <div class="form-field"><label>Costo sin IVA</label><input class="input" type="number" id="cc-costo" style="width:100%;" value="${c?c.costo_sin_iva:0}"></div>
        <div class="form-field full"><label>Grupo de elección (opcional)</label>
          <input class="input uc-input" id="cc-grupo" style="width:100%;" list="cc-grupo-list" value="${c&&c.grupo_eleccion?c.grupo_eleccion:''}" placeholder="EJ. SALA QUIRÓFANO / TIPO DE ANESTESIA">
          <datalist id="cc-grupo-list">${groups.map(g=>`<option value="${g}">`).join('')}</datalist>

        </div>
        <div class="form-field full"><label style="display:flex; align-items:center; gap:8px;"><input type="checkbox" id="cc-activo" ${!c||c.activo!==false?'checked':''}> Concepto activo</label></div>
      </div>
    </div>
    <div class="modal-foot">
      ${c?`<button class="btn btn-danger" id="cc-del">${icon('trash')} Eliminar</button>`:''}

      <button class="btn btn-primary" id="cc-save">Guardar</button>
    </div>`);
  document.getElementById('cc-save').onclick = ()=>{
    const desc = document.getElementById('cc-desc').value.trim();
    if(!desc){ toast('Captura la descripción'); return; }
    const payload = { descripcion: desc, categoria: document.getElementById('cc-cat').value, costo_sin_iva: parseFloat(document.getElementById('cc-costo').value)||0,

    else { const nuevo = Object.assign({id: uid('CC').toUpperCase(), veces_usado:0, __new:true}, payload); DB.conceptos.push(nuevo); logAudit('Concepto', nuevo.id, 'Creación', desc); }
    persistExtra(); closeModal(); toast('Concepto guardado'); renderCatalogo();
  };
  const delBtn = document.getElementById('cc-del');
  if(delBtn) delBtn.onclick = ()=>{ if(confirm('¿Desactivar este concepto del catálogo?')){ c.activo=false; logAudit('Concepto', c.id, 'Desactivado', c.descripcion); persistExtra(); closeModal(); renderCatalogo(); } };
}

   BLOQUES RÁPIDOS DE CONCEPTOS
============================================================ */
function renderBloques(){
  document.getElementById('content').innerHTML = `
    <div class="toolbar"><span style="font-size:12.5px; color:var(--text-muted); max-width:520px;">Agrupa conceptos que siempre usas juntos (horas de quirófano, estancia, lista base) para llamarlos con un clic al capturar una cotización.</span>
      <button class="btn btn-primary" style="margin-left:auto;" onclick="openBloqueModal()">${icon('plus')} Nuevo bloque</button></div>
    <div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(280px,1fr));" id="bloques-grid"></div>`;
  drawBloquesGrid();
}
function drawBloquesGrid(){
  const grid = document.getElementById('bloques-grid');
  grid.innerHTML = DB.bloques.length ? DB.bloques.map(bq=>{
    const total = (bq.conceptos||[]).reduce((s,l)=>{ const c=conceptoById(l.id); return s+(c?c.costo_sin_iva*l.cantidad:0); },0);
    return `<div class="card">
      <div style="display:flex; justify-content:space-between; align-items:flex-start;"><div style="font-weight:700; font-size:14px;">${bq.nombre}</div>
        <button class="btn btn-sm" onclick="openBloqueModal('${bq.id}')">${icon('config')}</button></div>
      <div style="font-size:11.5px; color:var(--text-faint); margin:6px 0 10px;">${(bq.conceptos||[]).length} conceptos · ${fmtMoney(total)}</div>
      ${(bq.conceptos||[]).slice(0,4).map(l=>{ const c=conceptoById(l.id); return `<div style="font-size:11.5px; color:var(--text-muted); padding:3px 0;">• ${c?c.descripcion:l.id} (${l.cantidad}×)</div>`; }).join('')}
      ${(bq.conceptos||[]).length>4?`<div style="font-size:11px; color:var(--text-faint);">+${bq.conceptos.length-4} más…</div>`:''}
    </div>`;
  }).join('') : `<div class="empty-state" style="grid-column:1/-1;">${icon('quote')}<div>Aún no hay bloques rápidos. Crea el primero para agilizar tus cotizaciones.</div></div>`;
}
function openBloqueModal(id){
  const bq = id ? DB.bloques.find(x=>x.id===id) : null;
  const sel = bq ? Object.fromEntries((bq.conceptos||[]).map(l=>[l.id,l.cantidad])) : {};
  openModal(`
    <div class="modal-head"><div style="font-weight:700; font-size:16px;">${bq?'Editar bloque':'Nuevo bloque de conceptos'}</div><button class="drawer-close" onclick="closeModal()">${icon('x')}</button></div>
    <div class="modal-body">
      <div class="form-field full" style="margin-bottom:14px;"><label>Nombre del bloque</label><input class="input uc-input" id="bq-nombre" style="width:100%;" value="${bq?bq.nombre:''}" placeholder="EJ. BASE ESTÁNDAR LAPAROSCOPÍA (SALA + ESTANCIA + LISTA)"></div>
      <div class="picker-wrap" style="margin-bottom:12px;"><div class="searchbox" style="width:100%;">${icon('search')}<input class="uc-input" id="bq-search" placeholder="AGREGAR CONCEPTOS AL BLOQUE…"></div><div id="bq-results" class="picker-results" style="display:none;"></div></div>
      <div id="bq-list"></div>
    </div>
    <div class="modal-foot">${bq?`<button class="btn btn-danger" id="bq-del">${icon('trash')} Eliminar</button>`:''}<button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" id="bq-save">Guardar bloque</button></div>`);
  const listEl = document.getElementById('bq-list');
  renderConceptSelection(listEl, sel);
  wireConceptPicker(document.getElementById('bq-search'), document.getElementById('bq-results'), (cid)=>{ sel[cid]=(sel[cid]||0)+1; renderConceptSelection(listEl, sel); });
  document.getElementById('bq-save').onclick = ()=>{
    const nombre = document.getElementById('bq-nombre').value.trim();
    if(!nombre || !Object.keys(sel).length){ toast('Captura un nombre y agrega al menos un concepto'); return; }
    const conceptos = Object.entries(sel).map(([id,cantidad])=>({id,cantidad}));
    if(bq){ bq.nombre=nombre; bq.conceptos=conceptos; logAudit('Bloque', bq.id, 'Edición', nombre); }
    else { const nuevo = {id:uid('bq'), nombre, conceptos, __new:true}; DB.bloques.push(nuevo); logAudit('Bloque', nuevo.id, 'Creación', nombre); }
    persistExtra(); closeModal(); toast('Bloque guardado'); renderBloques();
  };
  const delBtn = document.getElementById('bq-del');
  if(delBtn) delBtn.onclick = ()=>{ if(confirm('¿Eliminar este bloque?')){ DB.bloques = DB.bloques.filter(x=>x.id!==bq.id); logAudit('Bloque', bq.id, 'Eliminación', bq.nombre); persistExtra(); closeModal(); renderBloques(); } };
}

/* Buscador de una sola lista de materiales (reutilizable, filtrado por palabras) */
function wireListaPicker(searchEl, resultsEl, onPick){
  searchEl.oninput = ()=>{
    const q = searchEl.value;
    if(!q.trim()){ resultsEl.style.display='none'; return; }
    const res = DB.listas_materiales.filter(l=>l.activo!==false && fuzzyMatch(l.nombre, q)).slice(0,10);
    resultsEl.innerHTML = res.length ? res.map(l=>`
      <div class="result-row" data-pick="${l.id}"><div class="result-main"><div class="result-title">${l.nombre}</div>
        <div class="result-sub">${(l.medicamentos||[]).length} medicamentos · ${(l.materiales||[]).length} materiales</div></div></div>`).join('')
      : `<div class="picker-empty">Sin coincidencias para "${q}"</div>`;
    resultsEl.style.display='block';
    resultsEl.querySelectorAll('[data-pick]').forEach(row=> row.onclick = ()=>{
      const l = DB.listas_materiales.find(x=>x.id===row.dataset.pick);
      onPick(l); resultsEl.style.display='none';
    });
  };
  document.addEventListener('click', e=>{ if(!e.target.closest('.picker-wrap')){ resultsEl.style.display='none'; } });
}

function drawListaMaterialesGrid(){

      </div>

function itemsToText(arr){ return (arr||[]).map(i=>i.cantidad+' '+i.descripcion).join('\n'); }
function textToItems(txt){
  return txt.split('\n').map(l=>l.trim()).filter(Boolean).map(line=>{
    const m = line.match(/^(\d+)\s+(.*)$/);
    return m ? {cantidad:parseInt(m[1]), descripcion:m[2].trim().toUpperCase()} : {cantidad:1, descripcion:line.toUpperCase()};
  });
}
function openListaMaterialesModal(id){
  const l = id ? DB.listas_materiales.find(x=>x.id===id) : null;
  openModal(`
    <div class="modal-head"><div style="font-weight:700; font-size:16px;">${l?'Editar lista':'Nueva lista de materiales'}</div><button class="drawer-close" onclick="closeModal()">${icon('x')}</button></div>
    <div class="modal-body">
      <div class="form-field full" style="margin-bottom:14px;"><label>Nombre de la lista</label><input class="input uc-input" id="lm-nombre" style="width:100%;" value="${l?l.nombre:''}" placeholder="LMYM AMBULATORIA CON SEDACIÓN"></div>
      <div class="form-field full" style="margin-bottom:14px;"><label>Notas (opcional)</label><input class="input uc-input" id="lm-notas" style="width:100%;" value="${l?l.notas||'':''}" placeholder="EJ. NO INCLUYE SUTURAS"></div>

      <div class="card" style="background:var(--surface-2); margin-bottom:16px;">
        <div style="font-weight:700; font-size:12.5px; margin-bottom:4px;">Cargar desde PDF (asistido)</div>
        <div style="font-size:11px; color:var(--text-faint); margin-bottom:10px; line-height:1.5;">Un archivo HTML no puede convertir tablas de PDF de forma 100% automática. Aquí se extrae el texto del PDF; revísalo, recorta la sección que corresponda y envíala a Medicamentos o Materiales con los botones.</div>
        <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
          <input type="file" id="lm-pdf-file" accept="application/pdf" style="display:none;">
          <button class="btn btn-sm" type="button" id="lm-pdf-btn">${icon('upload')} Cargar PDF</button>
          <span id="lm-pdf-status" style="font-size:11px; color:var(--text-faint);"></span>
        </div>
        <textarea id="lm-pdf-raw" style="width:100%; min-height:110px; margin-top:10px; font-family:var(--font-mono); font-size:10.5px; display:none;" placeholder="El texto extraído del PDF aparecerá aquí…"></textarea>
        <div style="display:flex; gap:8px; margin-top:8px;" id="lm-pdf-actions" style="display:none;">
          <button class="btn btn-sm" type="button" id="lm-pdf-to-meds">→ Enviar a Medicamentos</button>
          <button class="btn btn-sm" type="button" id="lm-pdf-to-mats">→ Enviar a Materiales</button>
        </div>
      </div>

      <div class="form-grid">
        <div class="form-field full"><label>Medicamentos — una línea por producto: "CANTIDAD DESCRIPCIÓN"</label>
          <textarea class="input" id="lm-meds" style="width:100%; min-height:160px; font-family:var(--font-mono); font-size:11.5px;" placeholder="1 FENTANILO 0.5MG/10ML">${itemsToText(l?l.medicamentos:[])}</textarea></div>
        <div class="form-field full"><label>Materiales e insumos — una línea por producto: "CANTIDAD DESCRIPCIÓN"</label>
          <textarea class="input" id="lm-mats" style="width:100%; min-height:220px; font-family:var(--font-mono); font-size:11.5px;" placeholder="5 AGUJAS ROSAS">${itemsToText(l?l.materiales:[])}</textarea></div>
        <div class="form-field full"><label style="display:flex; align-items:center; gap:8px;"><input type="checkbox" id="lm-activo" ${!l||l.activo!==false?'checked':''}> Lista activa</label></div>
      </div>
    </div>
    <div class="modal-foot">${l?`<button class="btn btn-danger" id="lm-del">${icon('trash')} Eliminar</button>`:''}<button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" id="lm-save">Guardar lista</button></div>`);
  document.getElementById('lm-pdf-btn').onclick = ()=> document.getElementById('lm-pdf-file').click();
  document.getElementById('lm-pdf-file').onchange = async (e)=>{
    const file = e.target.files[0]; if(!file) return;
    const statusEl = document.getElementById('lm-pdf-status');
    statusEl.textContent = 'Leyendo PDF…';
    try{
      if(!window.pdfjsLib) throw new Error('pdf.js no disponible');
      const buf = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({data:buf}).promise;
      let fullText = '';
      for(let p=1; p<=pdf.numPages; p++){
        const page = await pdf.getPage(p);
        const content = await page.getTextContent();
        fullText += content.items.map(it=>it.str).join(' ') + '\n';
      }
      document.getElementById('lm-pdf-raw').style.display='block';
      document.getElementById('lm-pdf-actions').style.display='flex';
      document.getElementById('lm-pdf-raw').value = fullText.trim();
      statusEl.textContent = 'Texto extraído de '+pdf.numPages+' página(s). Revísalo antes de enviarlo.';
    }catch(err){
      statusEl.textContent = 'No se pudo leer el PDF automáticamente. Pega el texto manualmente en los campos de abajo.';
    }
  };
  document.getElementById('lm-pdf-to-meds').onclick = ()=>{
    const raw = document.getElementById('lm-pdf-raw').value.trim();
    if(!raw){ toast('No hay texto para enviar'); return; }
    document.getElementById('lm-meds').value = raw; toast('Enviado a Medicamentos — revisa el formato');
  };
  document.getElementById('lm-pdf-to-mats').onclick = ()=>{
    const raw = document.getElementById('lm-pdf-raw').value.trim();
    if(!raw){ toast('No hay texto para enviar'); return; }
    document.getElementById('lm-mats').value = raw; toast('Enviado a Materiales — revisa el formato');
  };
  document.getElementById('lm-save').onclick = ()=>{
    const nombre = document.getElementById('lm-nombre').value.trim();
    if(!nombre){ toast('Captura el nombre de la lista'); return; }
    const payload = { nombre, notas: document.getElementById('lm-notas').value.trim(),
      medicamentos: textToItems(document.getElementById('lm-meds').value), materiales: textToItems(document.getElementById('lm-mats').value),
      activo: document.getElementById('lm-activo').checked };
    if(l){ Object.assign(l, payload); logAudit('Lista de materiales', l.id, 'Edición', nombre); }
    else { const nuevo = Object.assign({id:uid('lm'), __new:true}, payload); DB.listas_materiales.push(nuevo); logAudit('Lista de materiales', nuevo.id, 'Creación', nombre); }
    persistExtra(); closeModal(); toast('Lista guardada'); renderListasMateriales();
  };
  const delBtn = document.getElementById('lm-del');
  if(delBtn) delBtn.onclick = ()=>{ if(confirm('¿Desactivar esta lista?')){ l.activo=false; logAudit('Lista de materiales', l.id, 'Desactivada', l.nombre); persistExtra(); closeModal(); renderListasMateriales(); } };
}

let cotState = { page:1, perPage:9, search:'', estatus:'todos' };
function renderCotizaciones(){
  document.getElementById('content').innerHTML = `
    <div class="toolbar">
      <div class="searchbox" style="width:240px;">${icon('search')}<input id="cot-search" placeholder="Buscar médico o folio…"></div>
      <div class="chip-filter" id="cot-chips">
        <button class="chip active" data-s="todos">Todos</button>
        ${Object.keys(ESTADOS_COT).map(s=>`<button class="chip" data-s="${s}">${s}</button>`).join('')}
      </div>
      <button class="btn btn-primary" style="margin-left:auto;" onclick="openCotizacionWizard()">${icon('plus')} Nueva cotización</button>
    </div>
    <div class="table-wrap">
      <table><thead><tr><th>Folio</th><th>Médico</th><th>Procedimiento</th><th>Fecha</th><th>Monto</th><th>Estatus</th></tr></thead>
      <tbody id="cot-tbody"></tbody></table>
      <div class="pagination" id="cot-pg"></div>
    </div>`;
  document.getElementById('cot-search').oninput = e=>{ cotState.search=e.target.value; cotState.page=1; drawCotTable(); };
  document.getElementById('cot-chips').querySelectorAll('.chip').forEach(b=> b.onclick=()=>{ cotState.estatus=b.dataset.s; cotState.page=1; drawCotTable(); document.getElementById('cot-chips').querySelectorAll('.chip').forEach(x=>x.classList.toggle('active',x===b)); });
  drawCotTable();
}
function drawCotTable(){
  let list = DB.cotizaciones.filter(c=>{
    const m = medicoById(c.id_medico);
    if(cotState.search){ const q = cotState.search; if(!(m&&fuzzyMatch(m.nombre,q)) && !fuzzyMatch(String(c.id),q) && !fuzzyMatch(c.procedimiento||'',q)) return false; }
    if(cotState.estatus!=='todos' && c.estatus!==cotState.estatus) return false;
    return true;
  }).sort((a,b)=>new Date(b.fecha_creacion)-new Date(a.fecha_creacion));
  const page = paginate(list, cotState.page, cotState.perPage);
  document.getElementById('cot-tbody').innerHTML = page.length ? page.map(c=>{
    const m = medicoById(c.id_medico);
    return `<tr class="clickable" data-id="${c.id}">
      <td class="mono">${c.id}</td>
      <td><div class="name-cell"><div class="avatar">${m?initials(m.nombre):'—'}</div><div style="font-weight:600; font-size:12.5px;">${m?m.nombre:(c.medico_nombre||'—')}</div></div></td>
      <td>${c.procedimiento||'—'}</td><td style="color:var(--text-muted);">${fmtDate(c.fecha_creacion)}</td>
      <td style="font-weight:700;">${fmtMoney(c.costo_propuesta)}</td><td>${pillCot(c.estatus)}</td></tr>`;
  }).join('') : `<tr><td colspan="6"><div class="empty-state">${icon('quote')}<div>Sin cotizaciones que coincidan.</div></div></td></tr>`;
  document.querySelectorAll('#cot-tbody tr.clickable').forEach(tr=> tr.onclick=()=>openCotizacionDrawer(tr.dataset.id));
  paginationControls('cot-pg', list.length, cotState.page, cotState.perPage, p=>{ cotState.page=p; drawCotTable(); });
}
function openCotizacionDrawer(id){
  const c = DB.cotizaciones.find(x=>String(x.id)===String(id));
  if(!c) return;
  const m = medicoById(c.id_medico);

  openDrawer(`
    <div class="drawer-head">
      <div><div style="font-weight:700; font-size:15.5px;">Cotización ${c.id}</div>
        <div style="font-size:12px; color:var(--text-faint); margin-top:2px;">${m?m.nombre:(c.medico_nombre||'—')} · ${c.procedimiento||''}</div>
        <div style="margin-top:8px;">${pillCot(c.estatus)}</div></div>
      <button class="drawer-close" onclick="closeDrawer()">${icon('x')}</button>
    </div>
    <div class="drawer-body">
