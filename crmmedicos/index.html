      <div style="margin:18px 0 8px; font-weight:700; font-size:13px;">Condiciones (${condiciones.length})</div>
      ${condiciones.length ? `<ul style="font-size:12px; color:var(--text-muted); line-height:1.7; padding-left:18px; margin:0;">${condiciones.map(t=>`<li>${t}</li>`).join('')}</ul>` : emptyMini('Sin condiciones capturadas.')}
      <div style="margin-top:20px; display:flex; gap:8px; flex-wrap:wrap;">
        ${Object.keys(ESTADOS_COT).map(s=>`<button class="btn btn-sm ${c.estatus===s?'btn-primary':''}" onclick="setCotEstatus('${c.id}','${s}')">${s}</button>`).join('')}
      </div>
      <div style="display:flex; gap:8px; margin-top:14px; flex-wrap:wrap;">
        <button class="btn" style="flex:1;" onclick="closeDrawer();editCotizacionWizard('${c.id}', false)">${icon('config')} Editar</button>
        <button class="btn" style="flex:1;" onclick="closeDrawer();editCotizacionWizard('${c.id}', true)">${icon('plus')} Regenerar / reenviar</button>
      </div>
      <button class="btn btn-accent" style="width:100%; margin-top:10px;" onclick="generateCotizacionPDF('${c.id}')">${icon('download')} Descargar reporte PDF</button>
      ${c.regenerado_de ? `<div style="font-size:11px; color:var(--text-faint); margin-top:10px;">Regenerada a partir de ${c.regenerado_de}</div>`:''}
    </div>`);
}
function setCotEstatus(id, estatus){
  const c = DB.cotizaciones.find(x=>String(x.id)===String(id));
  if(!c) return;
  const prev = c.estatus; c.estatus = estatus;
  logAudit('Cotización', id, 'Cambio de estatus', `${prev} → ${estatus}`);
  const cs = DB.casos.find(x=>x.id_cotizacion===id);
  if(cs && cs.estatus==='Nuevo' && ['Aprobada','Enviada','En negociación'].includes(estatus)){
    cs.estatus = 'En seguimiento';
    logAudit('Caso', cs.id, 'Cambio de estatus', 'Nuevo → En seguimiento (por estatus de cotización)');
  }
  persistExtra(); toast('Estatus actualizado a "'+estatus+'"'); openCotizacionDrawer(id); renderFollowUpBubble();
}

/* ---- Wizard nueva cotización / edición / regeneración (4 pasos) ---- */
let wizardState = {};
function openCotizacionWizard(medicoIdPreset){
  wizardState = { mode:'new', originalId:null, medico:medicoIdPreset||'', procedimiento:'', conceptos:{}, clausulas:{}, step:1, costoManual:null, vigenciaManual:null, listaAsignada:null, _defaultsApplied:false };
  drawWizard();
}
function editCotizacionWizard(id, regenerar){
  const c = DB.cotizaciones.find(x=>String(x.id)===String(id));
  if(!c) return;
  wizardState = {
    mode: regenerar ? 'regenerate' : 'edit', originalId: c.id,
    medico: c.id_medico, procedimiento: c.procedimiento,
    conceptos: Object.fromEntries((c.conceptos||[]).map(l=>[l.id,l.cantidad])),
    clausulas: Object.fromEntries((c.condiciones||[]).map(cl=>[cl.id,true])),
    step:1, costoManual: c.costo_propuesta, vigenciaManual: regenerar ? null : (c.fecha_vigencia ? c.fecha_vigencia.slice(0,10) : null),
    listaAsignada: c.lista_asignada||null, _defaultsApplied:true
  };
  drawWizard();
}
function drawWizard(){
  const m = wizardState.medico ? medicoById(wizardState.medico) : null;
  const titleMap = {new:'Nueva cotización', edit:'Editar cotización '+wizardState.originalId, regenerate:'Regenerar / reenviar cotización'};
  openModal(`
    <div class="modal-head"><div style="font-weight:700; font-size:17px;">${titleMap[wizardState.mode]}</div><button class="drawer-close" onclick="closeModal()">${icon('x')}</button></div>
    <div class="modal-body" style="padding:26px 30px;">
      <div class="step-track"><div class="${wizardState.step>=1?'done':''}"></div><div class="${wizardState.step>=2?'done':''}"></div><div class="${wizardState.step>=3?'done':''}"></div><div class="${wizardState.step>=4?'done':''}"></div></div>
      <div style="font-size:11px; color:var(--text-faint); font-weight:700; text-transform:uppercase; letter-spacing:.06em; margin-bottom:16px;">Paso ${wizardState.step} de 4 · ${['Datos generales','Conceptos','Condiciones y costo','Revisión final'][wizardState.step-1]}</div>
      <div id="wizard-pane"></div>
    </div>
    <div class="modal-foot" id="wizard-foot"></div>`);
  document.querySelector('.modal').style.width = '720px';
  drawWizardPane();
}

function wzAddConcepto(id){ wizardState.conceptos[id] = (wizardState.conceptos[id]||0)+1; drawWizardConceptos(); }
function drawWizardConceptos(){
  const listEl = document.getElementById('wz-concepto-list');
  if(!listEl) return;
  renderConceptSelection(listEl, wizardState.conceptos);
  const total = Object.entries(wizardState.conceptos).reduce((s,[id,qty])=>{ const c=conceptoById(id); return s+(c?c.costo_sin_iva*qty:0); },0);
  const totalEl = document.getElementById('wz-total'); if(totalEl) totalEl.textContent = 'Subtotal: '+fmtMoney(total);
}
function saveWizardCotizacion(){
  const m = medicoById(wizardState.medico);
  const conceptosArr = Object.entries(wizardState.conceptos).map(([id,qty])=>{
    const c = conceptoById(id); return { id, descripcion: c?c.descripcion:id, categoria: c?c.categoria:'', cantidad:qty, costo_unitario: c?c.costo_sin_iva:0, total: c?c.costo_sin_iva*qty:0 };
  });
  const subtotal = conceptosArr.reduce((s,l)=>s+l.total,0);
  const condicionesArr = DB.clausulas.filter(cl=>wizardState.clausulas[cl.id]).map(cl=>({id:cl.id, titulo:cl.titulo, texto:cl.texto}));
  const costo = wizardState.costoManual || subtotal;
  const now = new Date();
  const vigenciaFecha = wizardState.vigenciaManual ? new Date(wizardState.vigenciaManual+'T12:00:00') : addDays(now, 15);

  if(wizardState.mode==='edit'){
    const c = DB.cotizaciones.find(x=>String(x.id)===String(wizardState.originalId));
    Object.assign(c, { id_medico: wizardState.medico, medico_nombre: m?m.nombre:'', especialidad: m?m.especialidad:'', procedimiento: wizardState.procedimiento,
      conceptos: conceptosArr, condiciones: condicionesArr, subtotal, costo_propuesta: costo, fecha_vigencia: vigenciaFecha.toISOString(), lista_asignada: wizardState.listaAsignada||null });
    c.historial_ediciones = c.historial_ediciones || []; c.historial_ediciones.push({fecha: now.toISOString(), accion:'Edición manual'});
    logAudit('Cotización', c.id, 'Edición', 'Cotización actualizada para '+(m?m.nombre:''));
    persistExtra(); closeModal(); toast('Cotización '+c.id+' actualizada'); navigate('cotizaciones'); setTimeout(()=>openCotizacionDrawer(c.id),250);
    return;
  }
  const folio = nextFolio();
  const vigencia = vigenciaFecha;
  const nueva = {
    id: folio, id_medico: wizardState.medico, medico_nombre: m?m.nombre:'', especialidad: m?m.especialidad:'', procedimiento: wizardState.procedimiento,
    fecha_creacion: now.toISOString(), fecha_vigencia: vigencia.toISOString(),
    conceptos: conceptosArr, condiciones: condicionesArr, subtotal, costo_propuesta: costo, lista_asignada: wizardState.listaAsignada||null,
    estatus: wizardState.mode==='regenerate' ? 'Enviada' : 'Borrador',
    regenerado_de: wizardState.mode==='regenerate' ? wizardState.originalId : null,
    historial_ediciones: [], __new:true
  };
  DB.cotizaciones.unshift(nueva);
  logAudit('Cotización', folio, wizardState.mode==='regenerate'?'Regeneración':'Creación', 'Para '+(m?m.nombre:'')+' · '+conceptosArr.length+' conceptos · '+condicionesArr.length+' condiciones');

  const casoNuevo = {
    id: uid('cs'), id_medico: wizardState.medico, id_cotizacion: folio,
    titulo: 'Cotización '+folio+' — '+wizardState.procedimiento,
    estatus: 'Nuevo', prioridad: 'Media', fecha_apertura: now.toISOString(),
    proxima_accion_fecha: null, proxima_accion_nota: '', fecha_programacion: null, convenio_id: null,
    interacciones: [{id:uid('it'), fecha:now.toISOString(), tipo:'Sistema', nota:'Cotización '+folio+' generada automáticamente por '+fmtMoney(costo)+'.'}],
    __new: true
  };
  DB.casos.unshift(casoNuevo);
  logAudit('Caso', casoNuevo.id, 'Creación automática', 'Vinculado a cotización '+folio);

  persistExtra(); closeModal(); toast('Cotización '+folio+' guardada'); navigate('cotizaciones'); setTimeout(()=>openCotizacionDrawer(folio),250);
  renderFollowUpBubble();
}

function stripEmoji(t){ return (t||'').replace(/\p{Extended_Pictographic}/gu,'').replace(/\uFE0F/g,'').trim(); }
function getCondicionesTexts(c){
  if(Array.isArray(c.condiciones)) return c.condiciones.map(x=> (x.titulo?x.titulo+': ':'') + stripEmoji(x.texto));
  if(typeof c.condiciones === 'string' && c.condiciones.trim()) return c.condiciones.split(/\s*,\s*(?=\p{Extended_Pictographic})/gu).map(stripEmoji).filter(Boolean);
  return [];
}
function getConceptosRows(c){
  if(Array.isArray(c.conceptos) && c.conceptos.length) return c.conceptos;
  return DB.detalle.filter(d=>String(d.id_cotizacion)===String(c.id)).map(d=>{ const co = conceptoById(d.id_concepto); return { descripcion: co?co.descripcion:d.id_concepto, cantidad:d.cantidad, total:d.total }; });
}
function slugify(text){
  return (text||'').toString()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-zA-Z0-9]+/g,'_')
    .replace(/^_+|_+$/g,'')
    .toUpperCase();
}
function generateCotizacionPDF(id){
  const c = DB.cotizaciones.find(x=>String(x.id)===String(id));
  if(!c || !window.jspdf){ toast('No se pudo generar el PDF'); return; }
  const m = medicoById(c.id_medico) || {nombre:c.medico_nombre, especialidad:c.especialidad};
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:'pt', format:'letter'});
  const pageW = doc.internal.pageSize.getWidth();
  const BLUE = [38,96,171], NAVY=[27,62,115];

  doc.setFillColor(255,255,255); doc.rect(0,0,pageW,96,'F');
  try{ doc.addImage(window.LOGO_URI, 'JPEG', 48, 16, 64, 64); }catch(e){}
  doc.setTextColor(...NAVY); doc.setFont('helvetica','bold'); doc.setFontSize(9);
  doc.text('COTIZACIÓN MÉDICA · CIRUGÍAS Y PROCEDIMIENTOS', 124, 42);
  doc.setDrawColor(...BLUE); doc.setLineWidth(2); doc.line(48,96,pageW-48,96);
  doc.setFont('helvetica','bold'); doc.setFontSize(12); doc.setTextColor(...BLUE);
  doc.text('FOLIO '+c.id, pageW-48, 36, {align:'right'});
  doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(90,100,110);
  doc.text('Emisión: '+fmtDate(c.fecha_creacion), pageW-48, 52, {align:'right'});
  doc.text('Vigencia: '+fmtDate(c.fecha_vigencia), pageW-48, 66, {align:'right'});

  let y = 128;
  doc.setTextColor(20,30,40); doc.setFont('helvetica','bold'); doc.setFontSize(10.5);
  doc.text('MÉDICO', 48, y);
  doc.setFont('helvetica','normal'); doc.setFontSize(10.5);
  doc.text((m.nombre||'—').toUpperCase(), 48, y+16);
  doc.setTextColor(100,110,118); doc.setFontSize(9);
  doc.text((m.especialidad||'').toUpperCase(), 48, y+30);
  doc.setTextColor(20,30,40); doc.setFont('helvetica','bold'); doc.setFontSize(10.5);
  doc.text('PROCEDIMIENTO', 320, y);
  doc.setFont('helvetica','normal'); doc.setFontSize(10.5);
  doc.text(doc.splitTextToSize((c.procedimiento||'—').toUpperCase(), 230), 320, y+16);

  y += 58;
  const rows = getConceptosRows(c).map(l=>[l.descripcion, String(l.cantidad||1)]);
  doc.autoTable({ startY:y, head:[['CONCEPTO INCLUIDO','CANT.']], body: rows.length?rows:[['Sin desglose capturado','—']],
    theme:'plain', headStyles:{fillColor:BLUE, textColor:255, fontStyle:'bold', fontSize:9}, bodyStyles:{fontSize:9, textColor:[30,40,50]},
    alternateRowStyles:{fillColor:[245,247,251]}, margin:{left:48,right:48}, columnStyles:{1:{halign:'center', cellWidth:60}} });

  let finalY = doc.lastAutoTable.finalY + 22;
  doc.setFillColor(...BLUE); doc.roundedRect(48, finalY, pageW-96, 46, 8, 8, 'F');
  doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(11);
  doc.text('TOTAL DEL PRESUPUESTO (IVA INCLUIDO)', 62, finalY+19);
  doc.setFontSize(17);
  doc.text(fmtMoney(c.costo_propuesta), pageW-62, finalY+30, {align:'right'});
  finalY += 66;

  doc.setFillColor(...NAVY); doc.roundedRect(48, finalY, pageW-96, 58, 8, 8, 'F');
  doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(9.5);
  doc.text('CONFIRME SU CIRUGÍA', 62, finalY+18);
  doc.setFont('helvetica','normal'); doc.setFontSize(8);
  const msg = 'Por favor confirme y conserve este presupuesto: es el documento oficial de referencia para la cirugía. Preséntelo el día del procedimiento para agilizar el proceso administrativo y asegurar una comunicación clara entre médico, hospital y paciente.';
  doc.text(doc.splitTextToSize(msg, pageW-124), 62, finalY+32);
  finalY += 76;

  const condiciones = getCondicionesTexts(c);
  if(condiciones.length){
    if(finalY > 610){ doc.addPage(); finalY = 60; }
    doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(...NAVY);
    doc.text('CONDICIONES DEL PRESUPUESTO', 48, finalY);
    doc.setFont('helvetica','normal'); doc.setFontSize(7.8); doc.setTextColor(100,110,118);
    let cy = finalY+15;
    condiciones.forEach(txt=>{
      const lines = doc.splitTextToSize('•  '+txt, pageW-96);
      if(cy + lines.length*10 > 750){ doc.addPage(); cy = 50; }
      doc.text(lines, 48, cy); cy += lines.length*10 + 4;
    });
  }

  if(c.lista_asignada){
    const lm = DB.listas_materiales.find(x=>x.id===c.lista_asignada.id && x.activo!==false);
    if(lm){
      doc.addPage();
      doc.setFillColor(...BLUE); doc.rect(0,0,pageW,50,'F');
      doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(12);
      doc.text('LISTA DE MATERIALES Y MEDICAMENTOS INCLUIDOS', 26, 24);
      doc.setFont('helvetica','normal'); doc.setFontSize(8.5);
      doc.text(lm.nombre.toUpperCase()+'  ·  FOLIO '+c.id, 26, 38);

      const MX = 26, GAP = 10;
      const colW = (pageW - MX*2 - GAP)/2;
      const leftX = MX, rightX = MX + colW + GAP;
      const startY = 70;
      const meds = [...(lm.medicamentos||[])].sort((a,b)=>a.descripcion.localeCompare(b.descripcion,'es'));
      const mats = [...(lm.materiales||[])].sort((a,b)=>a.descripcion.localeCompare(b.descripcion,'es'));

      if(meds.length){
        doc.autoTable({ startY, head:[['MEDICAMENTOS','CANT.']], body: meds.map(i=>[i.descripcion, String(i.cantidad)]),
          theme:'plain', headStyles:{fillColor:NAVY, textColor:255, fontStyle:'bold', fontSize:7.6, cellPadding:{top:3,bottom:3,left:4,right:2}},
          bodyStyles:{fontSize:6.8, textColor:[30,40,50], cellPadding:{top:2,bottom:2,left:4,right:2}},
          alternateRowStyles:{fillColor:[245,247,251]}, margin:{left:leftX, right:pageW-leftX-colW},
          tableWidth:colW, columnStyles:{1:{halign:'center', cellWidth:32}} });
      }
      if(mats.length){
        doc.autoTable({ startY, head:[['MATERIALES E INSUMOS','CANT.']], body: mats.map(i=>[i.descripcion, String(i.cantidad)]),
          theme:'plain', headStyles:{fillColor:BLUE, textColor:255, fontStyle:'bold', fontSize:7.6, cellPadding:{top:3,bottom:3,left:4,right:2}},
          bodyStyles:{fontSize:6.8, textColor:[30,40,50], cellPadding:{top:2,bottom:2,left:4,right:2}},
          alternateRowStyles:{fillColor:[245,247,251]}, margin:{left:rightX, right:MX},
          tableWidth:colW, columnStyles:{1:{halign:'center', cellWidth:32}} });
      }
      let ly = startY;
      if(meds.length || mats.length){
        // jsPDF-AutoTable solo expone el finalY de la última llamada; estimamos con conteo de filas
        const rowH = 9.2;
        const medsEnd = startY + 16 + meds.length*rowH;
        const matsEnd = startY + 16 + mats.length*rowH;
        ly = Math.max(medsEnd, matsEnd) + 14;
      }
      if(lm.notas){
        doc.setFont('helvetica','italic'); doc.setFontSize(7.3); doc.setTextColor(100,110,118);
        doc.text(doc.splitTextToSize('Nota: '+lm.notas, pageW-MX*2), MX, Math.min(ly, 790));
      }
    }
  }

  const pageCount = doc.internal.getNumberOfPages();
  for(let i=1;i<=pageCount;i++){
    doc.setPage(i);
    doc.setDrawColor(230,233,235); doc.line(48, 726, pageW-48, 726);
    doc.setFontSize(7.3); doc.setTextColor(110,120,130); doc.setFont('helvetica','bold');
    doc.text('HOSPITAL NOOR', 48, 738);
    doc.setFont('helvetica','normal');
    doc.text(HOSP_INFO.direccion+'  ·  Tel. '+HOSP_INFO.telefono, 48, 749);
    doc.text('Programación de cirugías: '+HOSP_INFO.contactoNombre+' ('+HOSP_INFO.contactoRol+') · '+HOSP_INFO.contactoTel, 48, 760);
    doc.setTextColor(...BLUE);
    doc.textWithLink('Portal de médicos — credencialización aquí', 48, 771, {url: HOSP_INFO.portal});
    doc.setTextColor(150,158,165); doc.setFont('helvetica','normal');
    doc.text('Página '+i+' de '+pageCount, pageW-48, 760, {align:'right'});
  }

  const fileName = [c.id, slugify(m.nombre), slugify(c.procedimiento)].filter(Boolean).join('_') + '.pdf';
  doc.save(fileName);
  logAudit('Cotización', c.id, 'PDF generado', 'Reporte descargado');
  persistExtra(); toast('PDF generado');
}

/* ---- Wizard: nueva / editar cotización aseguradora (4 pasos) ---- */
let asgWizard = {};
function openAseguradoraWizard(){
  asgWizard = { mode:'new', originalId:null, aseguradora:'', procedimiento:'', medico:'', hospitalConceptos:{}, hospitalCostoManual:null,
    proveedorNombre:'', proveedorItems:[], proveedorCostoManual:null, clausulas:{}, vigenciaManual:null, step:1, _defaultsApplied:false };

}
function editAseguradoraWizard(id){
  const a = DB.cotizaciones_aseguradora.find(x=>String(x.id)===String(id)); if(!a) return;
  asgWizard = { mode:'edit', originalId:a.id, aseguradora:a.aseguradora, procedimiento:a.procedimiento, medico:a.id_medico,
    hospitalConceptos: Object.fromEntries((a.hospital_conceptos||[]).map(l=>[l.id,l.cantidad])), hospitalCostoManual: a.hospital_total,
    proveedorNombre: a.proveedor_nombre||'', proveedorItems: (a.proveedor_conceptos||[]).map(l=>({...l})), proveedorCostoManual: a.proveedor_total,
    clausulas: Object.fromEntries((a.condiciones||[]).map(c=>[c.id,true])), vigenciaManual: a.fecha_vigencia ? a.fecha_vigencia.slice(0,10) : null, step:1, _defaultsApplied:true };
  drawAsgWizard();
}
function drawAsgWizard(){
  const titleMap = {new:'Nueva cotización para aseguradora', edit:'Editar cotización '+asgWizard.originalId};
  openModal(`
    <div class="modal-head"><div style="font-weight:700; font-size:17px;">${titleMap[asgWizard.mode]}</div><button class="drawer-close" onclick="closeModal()">${icon('x')}</button></div>
    <div class="modal-body" style="padding:26px 30px;">
      <div class="step-track"><div class="${asgWizard.step>=1?'done':''}"></div><div class="${asgWizard.step>=2?'done':''}"></div><div class="${asgWizard.step>=3?'done':''}"></div><div class="${asgWizard.step>=4?'done':''}"></div></div>

function sumConceptMap(map){ return Object.entries(map).reduce((s,[id,qty])=>{ const c=conceptoById(id); return s+(c?c.costo_sin_iva*qty:0); },0); }
function updateAsgHospitalTotal(){
  if(asgWizard.hospitalCostoManual!=null) return;
  const el = document.getElementById('asg-hospital-costo');
  if(el) el.value = Math.round(sumConceptMap(asgWizard.hospitalConceptos));
}
function saveAsgWizard(){
  const m = medicoById(asgWizard.medico);
  const hospitalConceptosArr = Object.entries(asgWizard.hospitalConceptos).map(([id,qty])=>{
    const c = conceptoById(id); return { id, descripcion: c?c.descripcion:id, categoria: c?c.categoria:'', cantidad:qty };
  });
  const hospitalTotal = asgWizard.hospitalCostoManual || sumConceptMap(asgWizard.hospitalConceptos);
  const provTotal = asgWizard.proveedorCostoManual!=null ? asgWizard.proveedorCostoManual : asgWizard.proveedorItems.reduce((s,i)=>s+i.total,0);
  const condicionesArr = DB.clausulas.filter(cl=>asgWizard.clausulas[cl.id]).map(cl=>({id:cl.id, titulo:cl.titulo, texto:cl.texto}));
  const now = new Date();
  const vigenciaFecha = asgWizard.vigenciaManual ? new Date(asgWizard.vigenciaManual+'T12:00:00') : addDays(now, 30);

  if(asgWizard.mode==='edit'){
    const a = DB.cotizaciones_aseguradora.find(x=>String(x.id)===String(asgWizard.originalId));
    Object.assign(a, {
      aseguradora: asgWizard.aseguradora, procedimiento: asgWizard.procedimiento, id_medico: asgWizard.medico, medico_nombre: m?m.nombre:'', especialidad: m?m.especialidad:'',
      hospital_conceptos: hospitalConceptosArr, hospital_total: hospitalTotal,
      proveedor_nombre: asgWizard.proveedorNombre, proveedor_conceptos: asgWizard.proveedorItems, proveedor_total: provTotal,
      total_general: hospitalTotal+provTotal, condiciones: condicionesArr, fecha_vigencia: vigenciaFecha.toISOString()
    });
    logAudit('Cotización Aseguradora', a.id, 'Edición', a.aseguradora+' · '+a.procedimiento);
    persistExtra(); closeModal(); toast('Cotización '+a.id+' actualizada'); navigate('aseguradoras'); setTimeout(()=>openAsgDrawer(a.id),250);
    return;
  }
  const folio = nextFolioAsg();
  const nueva = {
    id: folio, aseguradora: asgWizard.aseguradora, procedimiento: asgWizard.procedimiento, id_medico: asgWizard.medico, medico_nombre: m?m.nombre:'', especialidad: m?m.especialidad:'',
    fecha_creacion: now.toISOString(), fecha_vigencia: vigenciaFecha.toISOString(),
    hospital_conceptos: hospitalConceptosArr, hospital_total: hospitalTotal,
    proveedor_nombre: asgWizard.proveedorNombre, proveedor_conceptos: asgWizard.proveedorItems, proveedor_total: provTotal,
    total_general: hospitalTotal+provTotal, condiciones: condicionesArr, estatus:'Borrador', __new:true
  };
  DB.cotizaciones_aseguradora.unshift(nueva);
  logAudit('Cotización Aseguradora', folio, 'Creación', asgWizard.aseguradora+' · '+asgWizard.procedimiento+' · '+fmtMoney(nueva.total_general));
  persistExtra(); closeModal(); toast('Cotización '+folio+' guardada'); navigate('aseguradoras'); setTimeout(()=>openAsgDrawer(folio),250);
}

/* ---- PDF de cotización para aseguradora (sin costos unitarios) ---- */
function generateAseguradoraPDF(id){
  const a = DB.cotizaciones_aseguradora.find(x=>String(x.id)===String(id));
  if(!a || !window.jspdf){ toast('No se pudo generar el PDF'); return; }
  const m = medicoById(a.id_medico) || {nombre:a.medico_nombre, especialidad:a.especialidad};
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:'pt', format:'letter'});
  const pageW = doc.internal.pageSize.getWidth();
  const pageH = doc.internal.pageSize.getHeight();
  const M = 28.35; // 1 cm
  const NAVY=[27,62,115], BLUE=[38,96,171], PALEBLUE=[238,243,251], PALEGUINDA=[249,235,240], GUINDA=[142,27,60], GRAY=[70,78,86];
  const FS = 11; // tamaño de letra único para todo el documento

  function footer(){
    const n = doc.internal.getNumberOfPages();
    for(let i=1;i<=n;i++){
      doc.setPage(i);
      doc.setFontSize(9); doc.setTextColor(140,148,155); doc.setFont('helvetica','normal');
      doc.text(HOSP_INFO.direccion+' | Tel. '+HOSP_INFO.telefono, M, pageH-M+8);
      doc.text('Página '+i+' de '+n, pageW-M, pageH-M+8, {align:'right'});
    }
  }

  try{ doc.addImage(window.LOGO_URI, 'JPEG', M, M-6, 38, 38); }catch(e){}
  doc.setFont('helvetica','normal'); doc.setFontSize(FS); doc.setTextColor(60,68,76);
  doc.text('Fecha: '+fmtDate(a.fecha_creacion), pageW-M, M+8, {align:'right'});

  let y = M+52;
  doc.setDrawColor(...NAVY); doc.setLineWidth(1); doc.line(M, y, pageW-M, y);
  y += 16;
  doc.setFont('helvetica','bold'); doc.setFontSize(FS); doc.setTextColor(...NAVY);
  doc.text('COTIZACIÓN DE PROCEDIMIENTO — '+a.aseguradora.toUpperCase(), pageW/2, y, {align:'center'});
  y += 15;
  doc.setFontSize(FS);
  const procLines = doc.splitTextToSize(a.procedimiento.toUpperCase(), pageW-2*M-20);
  doc.text(procLines, pageW/2, y, {align:'center'});
  y += procLines.length*13 + 8;
  doc.setDrawColor(...NAVY); doc.line(M, y, pageW-M, y);
  y += 18;

  doc.setFont('helvetica','bold'); doc.setFontSize(FS); doc.setTextColor(20,30,40);
  doc.text('MÉDICO:', M, y);
  doc.setFont('helvetica','normal');
  doc.text((m.nombre||'—').toUpperCase(), M+56, y);
  y += 18;

  doc.setFillColor(252,248,238); doc.setDrawColor(225,205,150);

    bodyStyles:{fontSize:FS, textColor:[30,40,50]}, margin:{left:M,right:M}, columnStyles:{1:{halign:'center', cellWidth:55}} });
  y = doc.lastAutoTable.finalY + 8;

  doc.setFillColor(...PALEBLUE); doc.setDrawColor(...NAVY);
  doc.rect(M, y, pageW-2*M, 28, 'FD');
  doc.setFont('helvetica','bold'); doc.setFontSize(FS); doc.setTextColor(...NAVY);
  doc.text('COSTO APROXIMADO DEL HOSPITAL (IVA INCLUIDO)', M+8, y+18);

  if(y > pageH-M-140){ doc.addPage(); y = M+20; }

  // ---- Bloque PROVEEDOR ----
  doc.setFont('helvetica','bold'); doc.setFontSize(FS); doc.setTextColor(...GUINDA);

  doc.autoTable({ startY:y+6, head:[['Descripción','Cant.']], body:provBody,
    theme:'plain', headStyles:{fillColor:[255,255,255], textColor:GUINDA, fontStyle:'bold', fontSize:FS, lineWidth:{bottom:1}, lineColor:GUINDA},
    bodyStyles:{fontSize:FS, textColor:[30,40,50]}, margin:{left:M,right:M}, columnStyles:{1:{halign:'center', cellWidth:55}} });
  y = doc.lastAutoTable.finalY + 8;

  doc.setFillColor(...PALEGUINDA); doc.setDrawColor(...GUINDA);
  doc.rect(M, y, pageW-2*M, 34, 'FD');
  doc.setFont('helvetica','bold'); doc.setFontSize(FS); doc.setTextColor(...GUINDA);
  doc.text('COSTO APROXIMADO DEL PROVEEDOR (IVA INCLUIDO)', M+8, y+15);
  doc.setFont('helvetica','normal'); doc.setFontSize(9);
  doc.text('Puede variar en función del material utilizado.', M+8, y+27);
  doc.setFont('helvetica','bold'); doc.setFontSize(FS);
  doc.text(fmtMoney(a.proveedor_total), pageW-M-8, y+20, {align:'right'});
  y += 48;

  if(y > pageH-M-60){ doc.addPage(); y = M+20; }
  doc.setFillColor(40,40,45); doc.setDrawColor(20,20,24);
  doc.rect(M, y, pageW-2*M, 30, 'FD');
  doc.setFont('helvetica','bold'); doc.setFontSize(FS); doc.setTextColor(255,255,255);
  doc.text('COSTO TOTAL APROXIMADO DEL PROCEDIMIENTO (HOSPITAL + PROVEEDOR, IVA INCLUIDO)', M+8, y+19, {maxWidth: pageW-2*M-160});
  doc.setFontSize(13);
  doc.text(fmtMoney(a.total_general), pageW-M-8, y+20, {align:'right'});

  footer();

  // Página final: condiciones generales en 2 columnas
  doc.addPage();
  doc.setFont('helvetica','bold'); doc.setFontSize(FS); doc.setTextColor(...NAVY);
  doc.text('CONDICIONES GENERALES DEL PRESUPUESTO', pageW/2, M+10, {align:'center'});
  doc.setDrawColor(...NAVY); doc.line(M, M+18, pageW-M, M+18);

  const cond = a.condiciones || [];
  const gap = 14;
  const colW = (pageW - M*2 - gap)/2;
  let cx = [M, M+colW+gap], cy = [M+34, M+34];
  doc.setFontSize(FS);
  cond.forEach((cl,i)=>{
    const col = i%2;
    const titleLines = doc.splitTextToSize(cl.titulo || ('Condición '+(i+1)), colW-16);
    const textLines = doc.splitTextToSize(cl.texto, colW-16);
    const boxH = 12 + titleLines.length*13 + textLines.length*13 + 8;
    if(cy[col]+boxH > pageH-M){ doc.addPage(); cy=[M+16,M+16]; }
    doc.setDrawColor(...BLUE); doc.setFillColor(252,253,255);
    doc.roundedRect(cx[col], cy[col], colW, boxH, 4, 4, 'FD');
    doc.setFont('helvetica','bold'); doc.setFontSize(FS); doc.setTextColor(...BLUE);
    doc.text(titleLines, cx[col]+8, cy[col]+15);
    doc.setFont('helvetica','normal'); doc.setFontSize(FS); doc.setTextColor(...GRAY);
    doc.text(textLines, cx[col]+8, cy[col]+15+titleLines.length*13);
    cy[col] += boxH + 10;
  });

  footer();

  const fileName = [a.id, slugify(a.aseguradora), slugify(a.procedimiento)].filter(Boolean).join('_') + '.pdf';
  doc.save(fileName);
  logAudit('Cotización Aseguradora', a.id, 'PDF generado', 'Reporte descargado');
  persistExtra(); toast('PDF generado');
}

/* ============================================================
   SEGUIMIENTO CRM (Casos por médico) — cada cotización genera un caso,
   agrupados en árbol por médico con barra de progreso
============================================================ */
const ESTADOS_CASO = {
  'Nuevo':{color:'blue'}, 'En seguimiento':{color:'amber'}, 'Programación agendada':{color:'violet'},
  'Confirmado':{color:'green'}, 'Realizado':{color:'green'}, 'Cancelado':{color:'red'}, 'Perdido':{color:'red'}
};
const CASO_PROGRESS = { 'Nuevo':12, 'En seguimiento':35, 'Programación agendada':62, 'Confirmado':85, 'Realizado':100, 'Cancelado':100, 'Perdido':100 };
const TIPOS_INTERACCION = ['Llamada','Visita','WhatsApp','Correo','Reunión','Cita en hospital','Recorrido','Programación de cirugía','Sistema'];
function casoProgressBar(estatus){
  const pct = CASO_PROGRESS[estatus] || 10;
  const closed = estatus==='Cancelado' || estatus==='Perdido';
  const color = closed ? 'var(--red)' : (estatus==='Realizado'||estatus==='Confirmado' ? 'var(--green)' : (estatus==='Programación agendada' ? 'var(--violet)' : 'var(--amber)'));
  return `<div style="background:var(--surface-3); border-radius:999px; height:6px; width:100%; overflow:hidden;">
    <div style="width:${pct}%; height:100%; background:${color}; border-radius:999px;"></div></div>`;
}
/* Progreso de una interacción programada: % transcurrido entre su creación y su fecha programada */
function interactionProgress(it){
  if(!it.fecha_programada) return null;
  const start = new Date(it.fecha).getTime();
  const end = new Date(it.fecha_programada).getTime();
  const now = Date.now();
  const overdue = now > end && it.estatus !== 'Completada';
  const completed = it.estatus === 'Completada';
  let pct;
  if(completed) pct = 100;
  else if(overdue) pct = 100;
  else if(end<=start) pct = 50;
  else pct = Math.max(2, Math.min(98, Math.round(((now-start)/(end-start))*100)));
  const daysLeft = Math.ceil((end-now)/86400000);
  let label;
  if(completed) label = 'Completada';
  else if(overdue) label = 'Vencida hace '+Math.abs(daysLeft)+' día'+(Math.abs(daysLeft)===1?'':'s');
  else if(daysLeft<=0) label = 'Vence hoy';
  else label = 'Faltan '+daysLeft+' día'+(daysLeft===1?'':'s');
  return { pct, label, overdue, completed };
}
function interactionProgressBar(it, compact){
  const p = interactionProgress(it);
  if(!p) return '';
  const color = p.completed ? 'var(--green)' : (p.overdue ? 'var(--guinda)' : 'var(--blue)');
  return `<div style="margin-top:${compact?'4px':'6px'};">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:3px;">
      <span style="font-size:${compact?'9.5px':'10.5px'}; color:${p.overdue?'var(--guinda)':'var(--text-faint)'}; font-weight:600;">${p.label}</span>
    </div>
    <div style="background:var(--surface-3); border-radius:999px; height:${compact?'4px':'5px'}; width:100%; overflow:hidden;">
      <div style="width:${p.pct}%; height:100%; background:${color}; border-radius:999px;"></div>
    </div></div>`;
}
function nextPendingInteraction(cs){
  const pend = (cs.interacciones||[]).filter(it=>it.fecha_programada && it.estatus!=='Completada');
  if(!pend.length) return null;
  return pend.sort((a,b)=>new Date(a.fecha_programada)-new Date(b.fecha_programada))[0];
}
let casoState = { estatus:'todos', search:'', expanded:{} };
function renderCasos(){
  document.getElementById('content').innerHTML = `
    <div class="toolbar">
      <div class="searchbox" style="width:260px;">${icon('search')}<input id="caso-search" placeholder="Buscar médico o caso…"></div>
      <div class="chip-filter" id="caso-chips"><button class="chip active" data-s="todos">Todos</button>
        ${Object.keys(ESTADOS_CASO).map(s=>`<button class="chip" data-s="${s}">${s}</button>`).join('')}</div>
      <button class="btn btn-primary" style="margin-left:auto;" onclick="openCasoModal()">${icon('plus')} Nuevo caso</button>
    </div>
    <div id="caso-tree"></div>`;
  document.getElementById('caso-search').oninput = e=>{ casoState.search=e.target.value; drawCasoTree(); };
  document.getElementById('caso-chips').querySelectorAll('.chip').forEach(b=> b.onclick=()=>{ casoState.estatus=b.dataset.s; drawCasoTree(); document.getElementById('caso-chips').querySelectorAll('.chip').forEach(x=>x.classList.toggle('active',x===b)); });
  drawCasoTree();
}
function drawCasoTree(){
  const hoy = new Date();
  let list = DB.casos.filter(cs=>{
    const m = medicoById(cs.id_medico);
    if(casoState.search && !(m&&fuzzyMatch(m.nombre,casoState.search)) && !fuzzyMatch(cs.titulo||'',casoState.search)) return false;
    if(casoState.estatus!=='todos' && cs.estatus!==casoState.estatus) return false;
    return true;
  });
  const groups = {};
  list.forEach(cs=>{ (groups[cs.id_medico]=groups[cs.id_medico]||[]).push(cs); });
  const medicoIds = Object.keys(groups).sort((a,b)=>{
    const lastA = Math.max(...groups[a].map(c=>new Date(c.fecha_apertura).getTime()));
    const lastB = Math.max(...groups[b].map(c=>new Date(c.fecha_apertura).getTime()));
    return lastB - lastA;
  });
  const wrap = document.getElementById('caso-tree');
  if(!medicoIds.length){ wrap.innerHTML = `<div class="table-wrap"><div class="empty-state">${icon('followup')}<div>Sin casos que coincidan. Cada cotización nueva genera aquí un caso automáticamente.</div></div></div>`; return; }
  wrap.innerHTML = medicoIds.map(mid=>{
    const m = medicoById(mid);
    const casos = groups[mid].sort((a,b)=>new Date(b.fecha_apertura)-new Date(a.fecha_apertura));
    const abiertos = casos.filter(c=>!['Realizado','Cancelado','Perdido'].includes(c.estatus)).length;
    const forceOpen = !!casoState.search || casoState.estatus!=='todos';
    const open = forceOpen || !!casoState.expanded[mid];
    return `<div class="card" style="margin-bottom:10px; padding:0; overflow:hidden;">
      <div class="medico-tree-head" data-mid="${mid}" style="display:flex; align-items:center; gap:12px; padding:14px 18px; cursor:pointer;">
        <svg class="tree-chevron ${open?'open':''}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px; color:var(--text-faint); transition:.15s; flex-shrink:0;">${ICON.chevron}</svg>
        <div class="avatar">${m?initials(m.nombre):'—'}</div>
        <div style="flex:1; min-width:0;">
          <div style="font-weight:700; font-size:13.5px;">${m?m.nombre:'—'}</div>
          <div style="font-size:11px; color:var(--text-faint);">${m?m.especialidad:''}</div>
        </div>
        <span class="pill pill-blue pill-small">${casos.length} caso${casos.length>1?'s':''}</span>
        ${abiertos ? `<span class="pill pill-amber pill-small">${abiertos} activo${abiertos>1?'s':''}</span>` : `<span class="pill pill-green pill-small">Al día</span>`}
      </div>
      <div class="medico-tree-body" style="display:${open?'block':'none'}; border-top:1px solid var(--border);">
        ${casos.map(cs=>{
          let accion = '';
          if(cs.proxima_accion_fecha){ const d=new Date(cs.proxima_accion_fecha); accion = `<span class="pill pill-${d<hoy?'red':'amber'} pill-small">${icon('followup')} ${fmtDate(cs.proxima_accion_fecha)}</span>`; }
          const prog = cs.fecha_programacion ? `<span class="pill pill-violet pill-small">${icon('bolt')} Cirugía ${fmtDate(cs.fecha_programacion)}</span>` : '';
          const nextIt = nextPendingInteraction(cs);
          return `<div class="clickable" data-cid="${cs.id}" style="padding:12px 18px 12px 46px; border-bottom:1px solid var(--border);">
            <div style="display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:6px;">
              <div style="font-size:12.5px; font-weight:600;">${cs.titulo}${cs.id_cotizacion?` <span class="mono" style="font-weight:500; color:var(--text-faint);">· ${cs.id_cotizacion}</span>`:''}</div>
              ${estatusPillGeneric(cs.estatus, ESTADOS_CASO)}
            </div>
            ${casoProgressBar(cs.estatus)}
            <div style="display:flex; gap:6px; margin-top:8px; flex-wrap:wrap;">${accion}${prog}</div>
            ${nextIt ? `<div style="margin-top:4px; max-width:260px;"><span class="pill pill-blue pill-small" style="margin-bottom:2px;">${nextIt.tipo}</span>${interactionProgressBar(nextIt, true)}</div>` : ''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
  wrap.querySelectorAll('.medico-tree-head').forEach(h=> h.onclick = ()=>{
    const mid = h.dataset.mid; casoState.expanded[mid] = !casoState.expanded[mid]; drawCasoTree();
  });
  wrap.querySelectorAll('[data-cid]').forEach(row=> row.onclick = ()=> openCasoDrawer(row.dataset.cid));
}
function openCasoModal(id, medicoPreset){

  openModal(`
    <div class="modal-head"><div style="font-weight:700; font-size:16px;">${cs?'Editar caso':'Nuevo caso CRM'}</div><button class="drawer-close" onclick="closeModal()">${icon('x')}</button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-field full"><label>Médico</label><select class="select" id="cs-medico" style="width:100%;">
          <option value="">Selecciona…</option>${DB.medicos.map(m=>`<option value="${m.id}" ${(cs?cs.id_medico:medicoPreset)==m.id?'selected':''}>${m.nombre}</option>`).join('')}</select></div>
        <div class="form-field full"><label>Título del caso</label><input class="input uc-input" id="cs-titulo" style="width:100%;" value="${cs?cs.titulo:''}" placeholder="EJ. SEGUIMIENTO POST-COTIZACIÓN"></div>
        <div class="form-field"><label>Estatus</label><select class="select" id="cs-estatus" style="width:100%;">${Object.keys(ESTADOS_CASO).map(s=>`<option ${cs&&cs.estatus===s?'selected':''}>${s}</option>`).join('')}</select></div>
        <div class="form-field"><label>Prioridad</label><select class="select" id="cs-prioridad" style="width:100%;">${['Alta','Media','Baja'].map(p=>`<option ${cs&&cs.prioridad===p?'selected':''}>${p}</option>`).join('')}</select></div>
        <div class="form-field"><label>Próxima acción (fecha)</label><input class="input" type="date" id="cs-fecha" style="width:100%;" value="${cs&&cs.proxima_accion_fecha?cs.proxima_accion_fecha.slice(0,10):''}"></div>
        <div class="form-field"><label>Fecha de programación (cirugía)</label><input class="input" type="date" id="cs-fecha-prog" style="width:100%;" value="${cs&&cs.fecha_programacion?cs.fecha_programacion.slice(0,10):''}"></div>
        <div class="form-field full"><label>Nota de la próxima acción</label><input class="input uc-input" id="cs-nota" style="width:100%;" value="${cs?cs.proxima_accion_nota||'':''}" placeholder="EJ. LLAMAR PARA CONFIRMAR"></div>
        <div class="form-field full"><label>Convenio asignado (opcional)</label><select class="select" id="cs-convenio" style="width:100%;"><option value="">Sin convenio</option>
          ${DB.convenios.map(cv=>`<option value="${cv.id}" ${cs&&cs.convenio_id===cv.id?'selected':''}>${cv.nombre}</option>`).join('')}</select></div>
      </div>
    </div>
    <div class="modal-foot"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" id="cs-save">Guardar caso</button></div>`);
  document.getElementById('cs-save').onclick = ()=>{
    const idm = document.getElementById('cs-medico').value;
    const titulo = document.getElementById('cs-titulo').value.trim();
    if(!idm || !titulo){ toast('Selecciona médico y captura un título'); return; }
    const payload = { id_medico: idm, titulo, estatus: document.getElementById('cs-estatus').value, prioridad: document.getElementById('cs-prioridad').value,
      proxima_accion_fecha: document.getElementById('cs-fecha').value || null, proxima_accion_nota: document.getElementById('cs-nota').value,
      fecha_programacion: document.getElementById('cs-fecha-prog').value || null, convenio_id: document.getElementById('cs-convenio').value || null };
    if(cs){ Object.assign(cs, payload); logAudit('Caso', cs.id, 'Edición', titulo); }
    else { const nuevo = Object.assign({id:uid('cs'), id_cotizacion:null, fecha_apertura:new Date().toISOString(), interacciones:[], __new:true}, payload); DB.casos.unshift(nuevo); logAudit('Caso', nuevo.id, 'Creación', titulo); }
    persistExtra(); closeModal(); toast('Caso guardado');
    if(CURRENT_ROUTE==='casos') renderCasos();
    renderFollowUpBubble();
  };
}

      <div style="font-weight:700; font-size:13px; margin-bottom:10px;">Historial de interacciones (${(cs.interacciones||[]).length})</div>
      ${(cs.interacciones||[]).length ? [...cs.interacciones].sort((a,b)=>new Date(b.fecha)-new Date(a.fecha)).map(it=>{

        return `<div class="line-item" style="align-items:flex-start; flex-direction:column;">
          <div style="display:flex; justify-content:space-between; width:100%; align-items:flex-start; gap:8px;">
            <div class="desc"><span class="pill pill-blue pill-small">${it.tipo}</span> ${it.nota||''}<div class="cat">Registrada ${fmtDateTime(it.fecha)}</div></div>
            ${(p && !p.completed) ? `<button class="btn btn-sm" style="flex-shrink:0;" onclick="completarInteraccion('${cs.id}','${it.id}')">${icon('check')} Completar</button>` : ''}
          </div>
          ${p ? `<div style="width:100%;">${interactionProgressBar(it, false)}</div>` : ''}
        </div>`;
      }).join('')
        : emptyMini('Sin interacciones registradas todavía.')}

const ESTADOS_CONVENIO = { 'Activo':{color:'green'}, 'Próximo a vencer':{color:'amber'}, 'Vencido':{color:'red'}, 'Inactivo':{color:'muted'} };
function computeConvenioEstatus(cv){
  if(cv.estatus==='Inactivo') return 'Inactivo';
  if(!cv.vigencia_fin) return 'Activo';
  const fin = new Date(cv.vigencia_fin), hoy = new Date(), diff = (fin-hoy)/(1000*3600*24);
  if(diff<0) return 'Vencido'; if(diff<=15) return 'Próximo a vencer'; return 'Activo';
}
function renderConvenios(){
  document.getElementById('content').innerHTML = `
    <div class="toolbar"><span style="font-size:12.5px; color:var(--text-muted); max-width:520px;">Asigna descuentos, promociones o beneficios a médicos específicos, con condiciones y vigencia.</span>
      <button class="btn btn-primary" style="margin-left:auto;" onclick="openConvenioModal()">${icon('plus')} Nuevo convenio</button></div>
    <div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(310px,1fr));" id="conv-grid"></div>`;
  drawConvGrid();
}
function drawConvGrid(){
  const grid = document.getElementById('conv-grid');
  grid.innerHTML = DB.convenios.length ? DB.convenios.map(cv=>{
    const estatus = computeConvenioEstatus(cv);
    const meds = (cv.medicos||[]).map(id=>medicoById(id)).filter(Boolean);
    return `<div class="card">
      <div style="display:flex; justify-content:space-between; align-items:flex-start;">
        <div style="font-weight:700; font-size:14px;">${cv.nombre}</div>
        <button class="btn btn-sm" onclick="openConvenioModal('${cv.id}')">${icon('config')}</button></div>
      <div style="font-size:12px; color:var(--text-muted); margin:8px 0;">${cv.tipo}: <b>${cv.tipo==='Descuento %' ? cv.valor+'%' : fmtMoney(cv.valor)}</b></div>
      <div style="font-size:11.5px; color:var(--text-faint); margin-bottom:8px;">${meds.length} médico(s) · ${(cv.condiciones||[]).length} condiciones</div>
      <div style="display:flex; justify-content:space-between; align-items:center;">
        ${estatusPillGeneric(estatus, ESTADOS_CONVENIO)}<span style="font-size:11px; color:var(--text-faint);">${fmtDate(cv.vigencia_inicio)} — ${fmtDate(cv.vigencia_fin)}</span>
      </div>
    </div>`;
  }).join('') : `<div class="empty-state" style="grid-column:1/-1;">${icon('deals')}<div>Aún no hay convenios registrados.</div></div>`;
}

/* Checklist de médicos con buscador por palabras, reutilizable (ej. convenios) */
function wireMedicoMultiPicker(searchEl, listEl, selMap){
  const draw = (filter)=>{
    const items = filter ? DB.medicos.filter(m=>fuzzyMatch(m.nombre, filter)) : DB.medicos.filter(m=>selMap[m.id]);
    listEl.innerHTML = items.length ? items.map(m=>`
      <label class="clausula-row" style="cursor:pointer;">
        <input type="checkbox" data-mid="${m.id}" ${selMap[m.id]?'checked':''}>
        <span>${m.nombre} <span style="color:var(--text-faint); font-size:11px;">— ${m.especialidad}</span></span>
      </label>`).join('') : `<div class="picker-empty">${filter?'Sin coincidencias para "'+filter+'"':'Aún no has asignado médicos — busca arriba para agregar.'}</div>`;
    listEl.querySelectorAll('input[type=checkbox]').forEach(cb=> cb.onchange = ()=>{ selMap[cb.dataset.mid] = cb.checked; if(!cb.checked) draw(searchEl.value); });
  };
  draw('');
  searchEl.oninput = ()=> draw(searchEl.value);
  return draw;
}

        <button class="chip ${condState.contexto==='todas'?'active':''}" data-c="todas">Todas</button>
        <button class="chip ${condState.contexto==='medico'?'active':''}" data-c="medico">Médicos</button>

    <div class="table-wrap"><div id="cond-list"></div></div>`;
  document.getElementById('cond-search').oninput = e=>{ condState.search=e.target.value; drawCondList(); };
  document.getElementById('cond-chips').querySelectorAll('.chip').forEach(b=> b.onclick=()=>{ condState.contexto=b.dataset.c; drawCondList(); document.getElementById('cond-chips').querySelectorAll('.chip').forEach(x=>x.classList.toggle('active',x===b)); });
  document.getElementById('cond-add').onclick = ()=>{
    const titulo = document.getElementById('cond-titulo').value.trim();
    const contexto = document.getElementById('cond-contexto').value;
    const input = document.getElementById('cond-new'); const txt = input.value.trim();
    if(!txt){ toast('Escribe el texto de la condición'); return; }
    const nueva = { id: uid('cl'), titulo, texto: txt, default:false, activa:true, contexto, origen:'Agregada en CRM', __new:true };
    DB.clausulas.push(nueva); logAudit('Condición', nueva.id, 'Creación', (titulo?titulo+': ':'')+txt.slice(0,50));
    persistExtra(); document.getElementById('cond-titulo').value=''; input.value=''; toast('Condición agregada'); renderCondiciones();
  };
  drawCondList();
}
function contextoPill(contexto){
  if(contexto==='aseguradora') return `<span class="pill pill-guinda pill-small" data-ctx="aseguradora" style="cursor:pointer;">Aseguradoras</span>`;
  if(contexto==='ambos') return `<span class="pill pill-violet pill-small" data-ctx="ambos" style="cursor:pointer;">Ambas</span>`;
  return `<span class="pill pill-blue pill-small" data-ctx="medico" style="cursor:pointer;">Médicos</span>`;
}
function drawCondList(){
  let list = DB.clausulas.filter(c=>c.activa!==false && (fuzzyMatch(c.texto, condState.search) || fuzzyMatch(c.titulo||'', condState.search)));
  if(condState.contexto!=='todas') list = list.filter(c=> (c.contexto||'medico')===condState.contexto || c.contexto==='ambos');
  document.getElementById('cond-list').innerHTML = list.length ? `<table><thead><tr><th>Condición</th><th style="text-align:center;">Predeterminada</th><th>Se usa en</th><th>Origen</th><th></th></tr></thead><tbody>
    ${list.map(cl=>`<tr>
      <td style="font-size:12.5px; max-width:420px;">${cl.titulo?`<b>${cl.titulo}:</b> `:''}${cl.texto}</td>
      <td style="text-align:center;"><button type="button" class="mark-toggle ${cl.default?'active':''}" data-def="${cl.id}">${cl.default?icon('check'):''}</button></td>
      <td>${contextoPill(cl.contexto||'medico')}</td>
      <td><span class="pill ${cl.__new?'pill-blue':'pill-muted'}">${cl.origen || (cl.__new?'Agregada en CRM':'Catálogo original')}</span></td>
      <td><button class="btn btn-sm btn-danger" data-del="${cl.id}">${icon('trash')}</button></td>
    </tr>`).join('')}</tbody></table>`
    : `<div class="empty-state">${icon('followup')}<div>Sin condiciones que coincidan.</div></div>`;
  document.querySelectorAll('#cond-list [data-def]').forEach(btn=> btn.onclick = ()=>{
    const cl = DB.clausulas.find(c=>String(c.id)===String(btn.dataset.def));
    if(cl){ cl.default = !cl.default; logAudit('Condición', cl.id, cl.default?'Marcada predeterminada':'Desmarcada predeterminada', (cl.titulo||cl.texto).slice(0,50)); persistExtra(); drawCondList(); }
  });
  document.querySelectorAll('#cond-list [data-ctx]').forEach(p=> p.onclick = ()=>{
    const row = p.closest('tr'); const btn = row.querySelector('[data-def]');
    const cl = DB.clausulas.find(c=>String(c.id)===String(btn.dataset.def));
    if(!cl) return;
    const order = ['medico','aseguradora','ambos'];
    const cur = order.indexOf(cl.contexto||'medico');
    cl.contexto = order[(cur+1)%order.length];
    logAudit('Condición', cl.id, 'Contexto actualizado', cl.contexto);
    persistExtra(); drawCondList();
  });
  document.querySelectorAll('#cond-list [data-del]').forEach(b=> b.onclick = ()=>{
    const cl = DB.clausulas.find(c=>String(c.id)===String(b.dataset.del));
    if(cl && confirm('¿Quitar esta condición del catálogo activo?')){ cl.activa=false; logAudit('Condición', cl.id, 'Desactivada', (cl.titulo||cl.texto).slice(0,50)); persistExtra(); drawCondList(); renderCondiciones(); }
  });
}

    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{ try{ const parsed = JSON.parse(ev.target.result); DB = Object.assign(DB, parsed); logAudit('Sistema','-','Respaldo restaurado', file.name); persistExtra(); toast('Respaldo restaurado'); navigate('dashboard'); }catch(err){ toast('El archivo no es un respaldo válido'); } };
    reader.readAsText(file);
  };
  document.getElementById('reset-btn').onclick = async ()=>{
    if(!confirm('Esto eliminará todo lo creado en esta sesión de demo (cotizaciones, CRM, convenios, catálogo de plantillas y auditoría). ¿Continuar?')) return;
    try{ await lsDelete('crm_extra_data'); }catch(e){}
    location.reload();
  };
  drawHistTable();
}
function drawHistTable(){
  const all = [...DB.auditoria].sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));
  const page = paginate(all, histState.page, histState.perPage);
  document.getElementById('hist-tbody').innerHTML = page.length ? page.map(e=>`
    <tr><td style="color:var(--text-muted); white-space:nowrap;">${fmtDateTime(e.fecha)}</td>
      <td><span class="pill pill-blue">${e.entidad}</span></td><td style="font-weight:600;">${e.accion}</td>
      <td class="mono" style="font-size:11.5px;">${e.id_entidad} — ${e.detalle||''}</td>
      <td><button class="btn btn-sm" onclick="openAuditRef('${e.entidad}','${e.id_entidad}')">Ver</button></td></tr>`).join('')
    : `<tr><td colspan="5"><div class="empty-state">${icon('history')}<div>Aún no hay movimientos registrados. Todo lo que hagas a partir de hoy quedará aquí.</div></div></td></tr>`;
  paginationControls('hist-pg', all.length, histState.page, histState.perPage, p=>{ histState.page=p; drawHistTable(); });
}


/* ============ INIT ============ */
/* ============ ALERTA FLOTANTE DE SEGUIMIENTO (24 HRS) ============ */
function getPendingFollowUps(){
  if(!SESSION.authed) return [];
  const now = new Date();
  let dismissed = [];
  try{ dismissed = JSON.parse(localStorage.getItem('crm_dismissed_alerts')||'[]'); }catch(e){}
  return DB.casos.filter(cs=>{
    if(dismissed.includes(cs.id)) return false;
    if(!cs.id_cotizacion) return false;
    if(cs.estatus !== 'Nuevo') return false;
    const hrs = (now - new Date(cs.fecha_apertura)) / 36e5;
    return hrs >= 24;
  });
}
function getPendingInteractionAlerts(){
  if(!SESSION.authed) return [];
  const now = new Date();
  let dismissed = [];
  try{ dismissed = JSON.parse(localStorage.getItem('crm_dismissed_interactions')||'[]'); }catch(e){}
  const out = [];
  DB.casos.forEach(cs=>{
    (cs.interacciones||[]).forEach(it=>{
      if(!it.fecha_programada || it.estatus==='Completada') return;
      if(dismissed.includes(it.id)) return;
      if(new Date(it.fecha_programada) <= now) out.push({casoId:cs.id, itId:it.id, tipo:it.tipo});
    });
  });
  return out;
}
function renderFollowUpBubble(){
  let wrap = document.getElementById('followup-bubble');
  const pending = getPendingFollowUps();
  const pendingIt = getPendingInteractionAlerts();
  const total = pending.length + pendingIt.length;
  if(!total){ if(wrap) wrap.remove(); return; }
  if(!wrap){ wrap = document.createElement('div'); wrap.id='followup-bubble'; wrap.className='followup-bubble'; document.body.appendChild(wrap); }
  let title, sub;
  if(pending.length && pendingIt.length){
    title = total+' pendientes por atender en el CRM';
    sub = pending.length+' cotización(es) sin seguimiento y '+pendingIt.length+' interacción(es) programada(s) ya vencida(s).';
  } else if(pendingIt.length){
    title = pendingIt.length+' interacción'+(pendingIt.length>1?'es':'')+' programada'+(pendingIt.length>1?'s':'')+' por cumplir';
    sub = 'Ya se cumplió la fecha programada. Toca para revisar en el CRM.';
  } else {
    title = pending.length+' cotización'+(pending.length>1?'es':'')+' sin seguimiento';
    sub = 'Pasaron 24 hrs desde su creación sin actividad. Toca para revisar en el CRM.';
  }
  wrap.innerHTML = `<button class="fb-dismiss" id="fb-dismiss">${icon('x')}</button>
    <div class="fb-body" id="fb-body">${icon('followup')}
      <div><div class="fb-title">${title}</div><div class="fb-sub">${sub}</div></div>
    </div>`;
  document.getElementById('fb-body').onclick = ()=> navigate('casos');
  document.getElementById('fb-dismiss').onclick = (e)=>{
    e.stopPropagation();
    try{
      let dismissed = JSON.parse(localStorage.getItem('crm_dismissed_alerts')||'[]');
      pending.forEach(p=>dismissed.push(p.id));
      localStorage.setItem('crm_dismissed_alerts', JSON.stringify(dismissed));
      let dismissedIt = JSON.parse(localStorage.getItem('crm_dismissed_interactions')||'[]');
      pendingIt.forEach(p=>dismissedIt.push(p.itId));
      localStorage.setItem('crm_dismissed_interactions', JSON.stringify(dismissedIt));
    }catch(err){}
    wrap.remove();
  };
}

async function boot(){
  await loadSession();
  applyTheme();
  document.getElementById('theme-switch').querySelectorAll('button').forEach(b=>{
    b.onclick = ()=>{ SESSION.theme=b.dataset.t; applyTheme(); saveSession(); };
  });
  document.getElementById('logout-btn').onclick = ()=>{ SESSION.authed=false; saveSession(); location.reload(); };
  animateVitalLine();
  if(SESSION.authed){ showApp(); }
  setInterval(()=>{ if(SESSION.authed) renderFollowUpBubble(); }, 5*60*1000);
  document.getElementById('login-btn').onclick = doLogin;
  document.getElementById('pass-input').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
}
function doLogin(){
  const val = document.getElementById('pass-input').value;
  if(val === 'Crm2026'){
    SESSION.authed = true; saveSession(); showApp();
  } else {
    document.getElementById('login-err').textContent = 'Clave incorrecta. Intenta nuevamente.';
  }
}
function showApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').classList.add('show');
  document.getElementById('app-version').textContent = 'CRM Médicos '+APP_VERSION;
  renderNav();
  const r = location.hash.slice(1);
  navigate(ROUTES.find(x=>x.id===r) ? r : 'dashboard');
}
function animateVitalLine(){
  const path = document.getElementById('vitalpath');
  if(!path) return;
  let t=0;
  setInterval(()=>{
    t+=1;
    const shift = (t%40);
    path.setAttribute('d', `M0,17 L${50+shift},17 L${62+shift},4 L${74+shift},30 L${86+shift},17 L300,17`);
  }, 120);
}
document.getElementById('global-search').addEventListener('keydown', e=>{
  if(e.key==='Enter'){ const q=e.target.value.trim(); if(q){ navigate('medicos'); setTimeout(()=>{ const inp=document.getElementById('medico-search'); if(inp){inp.value=q; inp.dispatchEvent(new Event('input'));} },50); } }
});
boot();
</script>
